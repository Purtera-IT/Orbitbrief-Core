name: Deploy orbitbrief-core-worker to dev

# Push this file to Purtera-IT/Orbitbrief-Core as
# .github/workflows/deploy-dev.yml
#
# Triggered on push to main.  Rebuilds the orbitbrief-core-worker image
# (which lives in Platform-infra/orbitbrief-core-worker but bundles
# Orbitbrief-Core source at build time), then rolls the Container App.
#
# Required GitHub secrets:
#   AZURE_TENANT_ID:       f793fa28-2504-447d-893e-f314c51c54de
#   AZURE_CLIENT_ID:       87c3259e-ed41-4a19-a4fc-86e1b575e31f
#   AZURE_SUBSCRIPTION_ID: cd493e42-9cd6-4849-975a-3fbeb7fd93d1
#   PLATFORM_INFRA_CHECKOUT_TOKEN: PAT with repo:read on Purtera-IT/Platform-infra

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: purpulsedevacr
  ACR_REGISTRY: purpulsedevacr.azurecr.io
  IMAGE_NAME: orbitbrief-core-worker
  TAG: v1
  CONTAINER_APP: orbitbrief-core-worker-dev-eus2
  CONTAINER_APP_RG: purtera-dev-rg
  PARSER_OS_REPO: https://github.com/Purtera-IT/parser-os.git
  # v9: MUST match the ref parser-os-worker bundles (it writes the envelope the
  # brief-gen validates). v45.2 drifted — its AtomType enum lacks
  # acceptance_criterion / service_line / site_implementation_note / etc., so
  # envelope load fails orbitbrief.input.v2 validation on current parser output.
  PARSER_OS_REF: feat/clean-rubric-heads

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Orbitbrief-Core
        uses: actions/checkout@v4
        with:
          path: Orbitbrief-Core

      - name: Checkout Platform-infra (for worker Dockerfile)
        uses: actions/checkout@v4
        with:
          repository: Purtera-IT/Platform-infra
          token: ${{ secrets.PLATFORM_INFRA_CHECKOUT_TOKEN }}
          path: platform-infra-tmp

      - name: Stage orbitbrief-core-worker dir at build context root
        run: |
          cp -r platform-infra-tmp/orbitbrief-core-worker ./
          rm -rf platform-infra-tmp

      - name: Clone parser-os at pinned ref
        run: |
          git clone --depth 1 --branch ${{ env.PARSER_OS_REF }} \
            ${{ env.PARSER_OS_REPO }} parser-os

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR build
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image "${{ env.IMAGE_NAME }}:${{ env.TAG }}" \
            --image "${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA:0:12}" \
            --file orbitbrief-core-worker/Dockerfile \
            --no-format \
            .

      - name: Resolve new digest
        id: img
        run: |
          DIGEST=$(az acr manifest list-metadata \
            --name ${{ env.IMAGE_NAME }} --registry ${{ env.ACR_NAME }} \
            -o json | python -c "import json,sys; arr=json.load(sys.stdin); m=[x for x in arr if '${{ env.TAG }}' in (x.get('tags') or [])]; print(m[0]['digest'])")
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Roll Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.CONTAINER_APP_RG }} \
            --image "${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.img.outputs.digest }}"
