<div class="card" id="decision-card">
  <span class="pill {% if decision.action.value == 'reject' %}reject{% elif decision.action.value == 'edit' %}edit{% endif %}">
    decision recorded: {{ decision.action.value }}
  </span>
  <div class="small" style="margin-top: 8px;">
    by <code>{{ decision.decided_by }}</code> at {{ decision.decided_at }}
  </div>
  {% if decision.notes %}<div class="small">notes: {{ decision.notes }}</div>{% endif %}
  <div style="margin-top: 12px;">
    <a href="/queue">← back to queue</a>
  </div>
</div>
