    - pathway types, ceiling heights, lift needs, plenum/riser rating, accessible vs hard-lid areas
    - labeling convention, ANSI/TIA-606-C mapping, patch panel/faceplate format, as-built expectations
    - healthcare/ICRA, safety, escorts, after-hours windows, noise/dust containment, approvals
    - closeout artifacts, certification standard, test format, exception log, customer acceptance criteria
    gold_examples:
      scope_overview:
      - statement: Structured cabling refresh for 186 Cat6 drops across HQ floors 3-5, tied to MDF-A and IDF-3B.
        evidence_pattern: quantity_claim packet with drop count + scope_inclusion packet naming Cat6 and closets
        pitfalls: Do not infer fiber, conduit, or switch patching unless separate packets support them.
      detailed_scope_of_services:
      - statement: Pull, terminate, label, and certify 186 Cat6 UTP drops to RJ45 jacks and IDF patch panels.
        evidence_pattern: scope_inclusion packet with activity list + compliance_clause citing TIA-568.2-D
        pitfalls: Do not include cable tray or coring when the pathway packet says pathways are by others.
      deliverables:
      - statement: Closeout package with as-built markups, ANSI/TIA-606-C label export, and Fluke test PDFs.
        evidence_pattern: deliverables packet naming as-builts + compliance_clause naming labeling/test standards
        pitfalls: Do not invent LinkWare, CAD, or CSV formats when the closeout format is not specified.
      assumptions:
      - statement: Existing J-hook pathways have usable capacity for the stated Cat6 home runs.
        evidence_pattern: customer_override packet says existing pathways may be reused + no field validation packet
        pitfalls: Move to open_items if drawings conflict or pathway availability is explicitly unknown.
      customer_responsibilities:
      - statement: Customer to provide after-hours access, ceiling access approvals, and final room-by-room drop list.
        evidence_pattern: site_access packet on work window + missing_info packet on final drop matrix
        pitfalls: Do not ask the customer to perform provider certification testing when that is in scope.
      out_of_scope:
      - statement: Conduit installation, electrical work, switch configuration, and AP mounting are excluded.
        evidence_pattern: scope_exclusion packet naming conduit/electrical + active domain limited to cabling
        pitfalls: Do not exclude AP cabling if AP drops are the reason the cabling scope exists.
      risks_or_dependencies:
      - statement: Unknown riser sleeve capacity may affect schedule and material needs for MDF-to-IDF fiber runs.
        evidence_pattern: missing_info packet on riser capacity + quantity_claim packet with fiber count
        pitfalls: Do not present riser capacity as assumed available without evidence.
      completion_criteria:
      - statement: All approved drops pass TIA-568.2-D certification and are labeled to the accepted closet-room-jack format.
        evidence_pattern: compliance_clause packet + meeting_decision packet approving label format
        pitfalls: Do not use application uptime or AP performance as cabling completion criteria.
      open_items:
      - statement: Confirm whether existing camera cabling requires certification, continuity-only testing, or no provider
          test.
        evidence_pattern: missing_info packet on reuse testing + scope_inclusion packet referencing existing camera drops
        pitfalls: Do not assume reuse certification when only visual inspection is described.
