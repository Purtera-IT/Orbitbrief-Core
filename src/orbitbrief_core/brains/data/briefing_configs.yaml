        VPN: virtual private network
        BitLocker: Windows drive encryption
        FileVault: macOS drive encryption
        USMT: User State Migration Tool
        Entra ID: Microsoft cloud identity directory
    fields:
      scope_overview:
      - Summarize IMAC actions by site, user population, wave, device count, and device_classes when known
      - State whether work is desk-side, depot, remote-guided, onsite staging, or hybrid when supported
      - Identify image_template_types, migration_types, MDM enrollment, and asset tagging only when cited
      - Distinguish corporate-owned, leased, shared, kiosk, loaner, and BYOD devices when evidence supports it
      - Call out disposition_paths for replaced or recovered assets when scope includes legacy equipment
      - State scheduling model such as appointment-based, floor walk, cutover wave, or project room pickup
      - Highlight dependencies on device-to-user map, application list, user availability, and hardware readiness
      - Avoid including managed service support, procurement, licensing, or app remediation unless included
      detailed_scope_of_services:
      - List imac_actions by device_classes, site, user group, wave, and quantity when evidence supports it
      - Map each endpoint to user, desk, room, department, asset tag, serial, and legacy device when provided
      - Include receive, inventory, asset tag, stage, image, enroll, configure, deploy, validate, and handoff tasks
      - Specify image_template_types such as Autopilot, SCCM, MECM, Intune, Jamf, or KACE only when supported
      - Include migration_types for profile, data, browser favorites, email, OneDrive, or no-migration paths when cited
      - Include monitor, dock, keyboard, mouse, headset, printer, scanner, or mobile setup only when scoped
      - Include application install, VPN, MFA, BitLocker, FileVault, domain join, or MDM enrollment only when cited
      - Include old asset collection, wipe, package, return, redeploy, ITAD, or customer-retained disposition when scoped
      - Separate desk-side work from depot imaging, onsite staging, shipping, remote support, and hypercare tasks
      - Include user appointment, pre-call, cutover, acceptance, and day-one support steps only when supported
      - Avoid broad help desk support, application remediation, licensing, procurement, or network changes unless cited
      - Do not treat BYOD devices as in scope unless the source explicitly includes BYOD support or migration
      deliverables:
      - List device-to-user map, deployment tracker, wave status, asset update, and exception log separately
      - Include imaging, enrollment, MDM, or Autopilot logs only when customer-facing closeout is requested
      - Include asset tag, serial, model, user, site, disposition_path, and status fields when inventory output is scoped
      - Include migration checklist or user sign-off form when data or profile migration is in scope
      - Include old asset manifest, chain of custody, return tracker, or ITAD handoff report when recovery is scoped
      - Include application validation checklist only for applications explicitly included in service scope
      - Include user communication, schedule, or appointment report only when requested as a deliverable
      - Avoid listing internal technician runbooks, staging notes, or troubleshooting logs as deliverables
      - Flag undefined export format for trackers, asset updates, logs, and sign-off forms in open_items
      assumptions:
      - Use assumptions only when counts, waves, or hardware readiness are implied by source context
      - Do not assume BYOD, personal devices, or user-owned peripherals are included without evidence
      - Do not assume data migration, profile migration, or application migration when refresh only says swap hardware
      - Do not assume application licenses, installers, packaging, or compatibility are available without evidence
      - State user availability assumptions only when appointment or wave scheduling is implied but not final
      - State network, VPN, MDM, or imaging service availability only when customer tooling is referenced
      - State image readiness only when image_template_types or golden image dependency is referenced
      - Treat missing admin rights, enrollment permissions, MFA, or break-glass accounts as open_items
      - Do not assume disposition_paths for legacy devices when collection or return instructions are missing
      - Move conflicts in device counts, user maps, images, or migration expectations to open_items
      customer_responsibilities:
      - Require final device-to-user map with user, site, desk, device_classes, serial, and asset tag details
      - Require approved images, Autopilot/Intune/Jamf/SCCM/KACE readiness, profiles, and enrollment permissions
      - Require hardware, peripherals, docks, adapters, chargers, labels, and spares to be available before waves
      - Require application list, license availability, installers, test accounts, and validation owners when apps are scoped
      - Require user schedules, appointment windows, communications, desk access, and no-show escalation process
      - Require site access, badging, parking, staging space, secure storage, network access, and shipping support
      - Require backup guidance, data retention approval, and migration acceptance criteria before refresh cutover
      - Require disposition_paths, wipe requirements, chain-of-custody, leasing return, RMA, or ITAD instructions
      - Require customer technical contacts for image failures, enrollment issues, MFA, VPN, and exception decisions
      - Avoid asking users to share personal passwords; request approved access and escalation paths instead
      out_of_scope:
      - Exclude hardware procurement, lease negotiation, warranty registration, and RMA processing unless cited
      - Exclude software licensing, SaaS subscriptions, app packaging, and application remediation unless scoped
      - Exclude custom image development, task sequence engineering, MDM policy design, and tenant remediation unless cited
      - Exclude network remediation, Wi-Fi troubleshooting, printer server changes, and VPN redesign unless included
      - Exclude data recovery, forensic recovery, or migration of unsupported local data unless explicitly included
      - Exclude ongoing help desk, break/fix support, managed endpoint operations, and post-hypercare support unless scoped
      - Exclude BYOD support, personal device repair, and personal data handling unless customer explicitly includes it
      - Exclude physical furniture moves, cabling changes, and electrical work unless connected scope includes them
      - Exclude ITAD, wipe, disposal, return shipping, or lease return unless disposition_paths are included
      - Do not exclude data migration, apps, or peripherals if they are included by a scope_inclusion packet
      risks_or_dependencies:
      - Call out missing device-to-user map, serials, asset tags, site list, or wave schedule as execution risk
      - Flag user no-shows, inaccessible desks, remote users, after-hours constraints, and appointment churn
      - Flag image, Autopilot, SCCM, MECM, Intune, Jamf, KACE, or MDM readiness gaps when tooling is referenced
      - Identify application license, installer, compatibility, test account, or owner dependencies when apps are scoped
      - Call out data migration volume, local profile state, encryption, backup, and OneDrive sync risks when relevant
      - Flag hardware shortages, wrong models, missing docks, adapters, chargers, peripherals, and spares
      - Identify network, VPN, MFA, domain join, Wi-Fi, and enrollment dependencies that may block deployment
      - Call out BYOD versus corporate-owned ambiguity, personal data handling, and privacy constraints when present
      - Flag legacy asset custody, wipe, ITAD, lease return, RMA, and secure storage dependencies
      - Use risks_or_dependencies for delivery constraints; use open_items for missing final decisions
      - Flag conflicting counts between RFP, spreadsheet, ticket export, asset inventory, and meeting decisions
      - Avoid claiming productivity or adoption outcomes as guaranteed project results
      completion_criteria:
      - Define completion by approved imac_actions completed for the stated device count, sites, users, and waves
      - Require devices imaged, enrolled, asset tagged, physically installed, and handed off when those steps are scoped
      - Require user sign-off, technician checklist, or customer acceptance only when an acceptance path is defined
      - Require migrated data or profile elements to meet the agreed migration_types and exception handling path
      - Require included apps, VPN, MFA, encryption, printers, and peripherals validated to the agreed checklist
      - Require asset inventory and deployment tracker updated with serial, user, site, status, and disposition_path
      - Require legacy assets collected, wiped, staged, returned, or handed off according to scoped disposition_paths
      - Require exceptions documented with owner, impact, next step, and whether they block wave closure
      - Require hypercare or day-one support closure only if post-deployment support is included
      - Avoid defining completion by long-term user productivity, app adoption, or managed service SLA performance
      open_items:
      - Ask for device counts by imac_actions, device_classes, site, department, user group, and wave
      - Ask for final device-to-user map with serial, asset tag, desk, room, legacy device, and owner
      - Ask for image_template_types, MDM tooling, tenant readiness, enrollment method, and test plan
      - Ask for migration_types, data size limits, profile scope, backup rules, and user sign-off method
      - Ask for application list, licensing, installers, package ownership, validation owners, and exceptions
      - Ask for user schedule, appointment rules, communications plan, no-show handling, and after-hours needs
      - Ask for hardware readiness, delivery dates, accessories, docks, adapters, labels, spares, and storage
      - Ask for disposition_paths, wipe requirements, chain-of-custody, lease return, ITAD, and RMA steps
      - Ask whether BYOD, shared devices, kiosks, loaners, and personal data handling are included or excluded
      - Ask for acceptance criteria, hypercare window, escalation contacts, and exception closure process
