      voltage_classes: ["120V", "208V", "240V", "277V", "480V"]
      ups_brands: [APC, Eaton, Vertiv, "Schneider Electric", Tripp Lite]
      generator_brands: [Generac, Cummins, Kohler, Caterpillar]
      transfer_switch_types: [ATS, "manual transfer switch", "static transfer switch"]
      ground_targets: ["TGB", "TMGB", "ground bar", "Telecommunications Grounding Busbar", "Telecommunications Main Grounding Busbar"]
