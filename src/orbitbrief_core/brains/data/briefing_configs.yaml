    - install/move/add/change/refresh counts by site, wave, user, device class, and appointment model
    - device-to-user map, serial/asset tags, desk/room, legacy asset mapping, owner and exception handling
    - image type, MDM/enrollment tooling, domain/join method, encryption, VPN, MFA and validation boundary
