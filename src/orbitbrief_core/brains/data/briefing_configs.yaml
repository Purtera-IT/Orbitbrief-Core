    subdomain_notes:
    - install/move/add/change/refresh counts by site, wave, user, device class, and appointment model
    - device-to-user map, serial/asset tags, desk/room, legacy asset mapping, owner and exception handling
    - image type, MDM/enrollment tooling, domain/join method, encryption, VPN, MFA and validation boundary
    - data/profile migration type, backup expectations, local data limits, user sign-off and rollback path
    - application list, licensing, installers, package ownership, app validation and remediation exclusions
    - hardware readiness, docks/adapters/peripherals, staging area, shipping, storage and spare inventory
    - old asset disposition, wipe/ITAD/lease return/RMA, custody, packaging, user-keep and secure storage
    - user communications, scheduling, no-shows, desk access, hypercare window, escalation contacts
    gold_examples:
      scope_overview:
      - statement: Laptop refresh for 220 corporate users across HQ and three branches using Autopilot enrollment.
        evidence_pattern: quantity_claim packet with device count + scope_inclusion packet naming Autopilot
        pitfalls: Do not include BYOD phones or tablets unless source packets explicitly add them.
      detailed_scope_of_services:
      - statement: Stage, image, enroll, asset tag, deploy, migrate OneDrive-backed profiles, and collect old laptops.
        evidence_pattern: scope_inclusion packet + customer_override packet naming OneDrive and collection path
        pitfalls: Do not add local data migration or app packaging unless cited.
      deliverables:
      - statement: Deployment tracker with user, serial, asset tag, site, wave, status, and legacy disposition path.
        evidence_pattern: deliverables packet naming tracker + quantity_claim packet with user/device rows
        pitfalls: Do not invent ServiceNow, CSV, or XLSX export requirements unless the source names them.
      assumptions:
      - statement: Customer-provided Autopilot profile and corporate image are approved before the first wave.
        evidence_pattern: scope_inclusion packet referencing Autopilot + action_item assigning image approval
        pitfalls: Use open_items if image ownership or approval date is missing.
      customer_responsibilities:
      - statement: Customer to provide device-to-user map, user schedule, app list, image access, and disposition rules.
        evidence_pattern: missing_info packet on user map + action_item packet assigning customer inputs
        pitfalls: Do not ask users for passwords; request approved admin or enrollment access.
      out_of_scope:
      - statement: Hardware procurement, custom app packaging, data recovery, and ongoing help desk support are excluded.
        evidence_pattern: scope_exclusion packet + scope_inclusion limited to refresh deployment
        pitfalls: Do not exclude data migration if migration_types are explicitly included elsewhere.
      risks_or_dependencies:
      - statement: Missing user schedule and app license confirmation may delay wave deployment and acceptance.
        evidence_pattern: missing_info packet on schedule + missing_info packet on app licensing
        pitfalls: Do not convert scheduling gaps into assumptions when users must be present.
      completion_criteria:
      - statement: Wave is complete when devices are enrolled, user-accepted, tracker-updated, and old assets collected.
        evidence_pattern: scope_inclusion packet + deliverables packet naming tracker and disposition update
        pitfalls: Do not require post-hypercare SLA performance unless support is in scope.
      open_items:
      - statement: Confirm whether local profile data outside OneDrive is migrated, skipped, or handled by user backup.
        evidence_pattern: missing_info packet on data migration boundary
        pitfalls: Do not assume cloud backup covers all user data.
