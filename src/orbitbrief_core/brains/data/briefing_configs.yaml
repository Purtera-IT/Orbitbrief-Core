      - "Capture which carriers/bands are in scope and whether carrier approval is the customer's or the integrator's responsibility."
    risk_patterns:
      - "Carrier NOC approval timeline (cellular) slips months and gates turn-up."
      - "AHJ acceptance (ERRCS) fails coverage % / DAQ on the measured grid."
      - "Donor signal too weak / no rooftop access - design assumptions invalid."
      - "Head-end space, power, or riser pathway unavailable at install."
      - "Battery / secondary-power for public-safety DAS undersized for code runtime."
    compliance_frameworks:
      - "NFPA 1221/1225 or IFC 510 public-safety radio coverage (ERRCS) per AHJ."
