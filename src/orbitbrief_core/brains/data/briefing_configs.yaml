      - "Allocation / chip-shortage substitution for hardware not on the BOM."
      - "Customer PO process slow; cash-flow milestones missed."
      - "Cap-ex vs op-ex categorization disputed by customer finance — invoicing delayed."
      - "Vendor MSRP discount tier changes between quote validity and order placement."
    compliance_frameworks:
      - "Sarbanes-Oxley (SOX) for public-company finance approvals."
      - "Customer NDA / MSA terms control how pricing is shared."
      - "FCPA / anti-corruption when working with foreign distributors."
    gold_examples:
      scope_overview:
      - statement: "Sourcing, PO issuance, and milestone billing for the project BOM through Graybar and Wesco under Net 30 terms."
        evidence_pattern: "pricing/PO packet with quote or PO numbers + scope_inclusion packet naming distributors and net terms"
        pitfalls: "Do not infer the engineering or installation work itself; this pack covers money flow and sourcing only."
      detailed_scope_of_services:
      - statement: "Issue purchase orders against the BOM, track distributor lead times, process vendor invoices, and bill the customer per the milestone schedule."
        evidence_pattern: "pricing packet with PO lines/quote numbers + milestone packet naming the billing schedule"
        pitfalls: "Do not add installation, configuration, or warranty registration labor unless a packet names it as in scope."
      risks_or_dependencies:
      - statement: "Distributor lead time exceeding the project schedule and a slow customer PO process may miss cash-flow milestones."
        evidence_pattern: "missing_info packet on lead time or PO approval timeline + milestone packet naming billing dates"
        pitfalls: "Do not present allocation or chip-shortage substitution as assumed availability when the BOM is not confirmed in stock."
      out_of_scope:
      - statement: "Engineering, installation labor, and the subcontractor's field work are excluded; scope is sourcing and invoicing only."
        evidence_pattern: "scope_exclusion packet naming engineering/install + scope_inclusion limited to procurement and finance"
        pitfalls: "Do not exclude subcontractor procurement if the source includes sourcing of their materials."
  electrical:
