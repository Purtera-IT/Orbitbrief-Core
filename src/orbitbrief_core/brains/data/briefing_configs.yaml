_doc: OrbitBrief domain briefing configs extracted from AWESOME_CHASE intake workbook v4. Workbook fills override DEFAULT_GUIDANCE;
  per-domain defaults layer in between.
version: v4
canonical_fields:
- scope_overview
- detailed_scope_of_services
- deliverables
- assumptions
- customer_responsibilities
- out_of_scope
- risks_or_dependencies
- completion_criteria
