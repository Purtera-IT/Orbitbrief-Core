    fields:
      scope_overview:
      - Summarize physical rack/cabinet work by site, cage, cabinet, device type, and device count
      - State cabinet count, RU range, asset count, and patching scope when packet evidence provides them
      - Distinguish rack-and-stack, in-rack patching, recabling, migration support, and de-rack work
      - Use cabinet_types, pdu_classes, and cable_management_styles terms when the source provides detail
      - Identify whether work is onsite smart hands, remote-guided, or hybrid with customer remote validation
      - Call out rack elevation or patch matrix availability because it controls sequencing and quality
      - Highlight power, OOB, floor loading, access window, or escort constraints only when supported
      - Avoid including logical network config, storage zoning, OS work, or application cutover unless cited
      detailed_scope_of_services:
      - List unload, inventory, asset tag, rail kit prep, mount, connect, dress, label, photo, and handoff tasks
      - Differentiate net-new rack/stack, in-rack patching, recabling, migration, and de-rack activities
      - Preserve RU positions, cabinet IDs, device hostnames, serials, asset tags, and port IDs when provided
      - Identify cabinet_types and device classes such as server, switch, firewall, storage, PDU, or console gear
      - State power_phases, pdu_classes, plug types, and A/B feed connection requirements when known
      - Include rail kits, brackets, cage nuts, blanking panels, airflow, and weight restrictions only when cited
      - Include OOB, KVM, LOM, crash cart, or serial console connection only when source packets include it
      - Specify cable_management_styles and labeling_standards for patching, dressing, and cable bundles
      - List patch matrix work by source/destination port, media type, cable color, and length when available
      - Include power-on, LED check, remote login handoff, or burn-in only when specifically in scope
      - Separate staging, shipping, receiving, and chain-of-custody tasks from cabinet installation tasks
      - Avoid system configuration, VLANs, routing, firmware, zoning, or OS/application work unless cited
      deliverables:
      - List updated rack elevations separately from patch matrices, label exports, and cabinet photo sets
      - Include asset inventory with serials, hostnames, asset tags, RU positions, and cabinet IDs when scoped
      - Include power connection map showing PDU, outlet, PSU, A/B feed, and plug type when source requests it
      - Include OOB or console connection map only when OOB cabling is part of the scope
      - Include install, move, de-rack, or migration checklists as deliverables only when customer-facing
      - Include chain-of-custody or decommission manifest when equipment leaves the cabinet or site
      - Include photo set per cabinet, front and rear, after dressing and labeling when requested
      - Avoid treating mounted hardware itself as a document deliverable; list it in completion criteria
      - Flag undefined export formats for rack elevations, patch matrices, or labels in open_items
      assumptions:
      - Use assumptions only when rack elevations or patch matrices are referenced but not fully verified
      - Do not assume power whips, PDU capacity, receptacle type, or A/B diversity without evidence
      - Do not assume rail kits, optics, patch cords, console cables, or cage nuts are provider-supplied
      - State device weight, depth, airflow, or RU fit assumptions only when source gives enough basis
      - Treat missing OOB credentials, IPs, console pinouts, or remote contact details as open_items
      - Use assumptions for customer-provided labels or asset tags only when packets imply customer standard
      - Do not assume cable colors, lengths, media types, or dressing style when patch matrix omits them
      - Avoid assuming floor loading, seismic anchoring, or cabinet density compliance without facility input
      - State maintenance-window assumptions only when the schedule is implied but not fully confirmed
      - Move conflicting rack elevations, BOMs, or patch matrices to open_items instead of smoothing them over
      customer_responsibilities:
      - Require final rack elevations, patch matrices, BOM, device inventory, and asset tag scheme before work
      - Require cage, cabinet, loading dock, staging area, and escort access for the planned work window
      - Require power whips, circuits, PDUs, plug types, and A/B feed availability to be confirmed by facility
      - Require customer to provide rail kits, optics, transceivers, cables, labels, and spares when owner-furnished
      - Require remote technical contacts for power-on validation, OOB handoff, and exception decisions
      - Require approved maintenance windows, change tickets, outage notices, and rollback contacts when needed
      - Require labeling_standards and cable colors to be approved before patching or recabling starts
      - Require receiving, unpacking, disposal, return, or RMA instructions for hardware and packaging materials
      - Require facility rules for hot/cold aisle work, ladders, lifts, fire suppression, and security checkpoints
      - Avoid assigning provider tasks such as physical mounting to the customer when they are in scope
      out_of_scope:
      - Exclude logical network, firewall, storage, hypervisor, BIOS, firmware, OS, and application configuration
      - Exclude new electrical circuits, whips, receptacles, PDU procurement, and UPS changes unless cited
      - Exclude floor loading analysis, seismic engineering, cage construction, and cabinet anchoring unless scoped
      - Exclude structured cabling outside the cabinet unless cross-rack or overhead work is explicitly included
      - Exclude data migration, backup, replication, and workload cutover unless packet scope includes them
      - Exclude cable remediation beyond the stated patch matrix, rack, cabinet, or port list
      - Exclude monitoring setup, CMDB updates, and service desk onboarding unless listed as deliverables
      - Exclude hardware procurement, warranty registration, RMA processing, and disposal unless explicitly included
      - Do not exclude in-rack patching if the patch matrix or rack-and-stack packet includes it
      - Avoid generic exclusions; tie each exclusion to a physical/logical boundary the PM must preserve
      risks_or_dependencies:
      - Call out missing rack elevations, patch matrices, device inventory, or cabinet IDs as execution risk
      - Flag unknown device weight, depth, power draw, airflow direction, and RU fit as facility risk
      - Flag mismatched rail kits, optics, cables, plugs, receptacles, or PDU capacity as schedule risk
      - Identify access window, escort, change control, loading dock, and shipping dependencies
      - State risk of unlabeled or live production cabling when recabling or decommission work is included
      - Call out OOB dependency when remote validation, console access, or LOM handoff is needed
      - Identify A/B power or redundancy risk when source only confirms a single feed or unclear PDU class
      - Flag asset discrepancies between BOM, shipment, rack elevation, and onsite inventory
      - Note cabinet density, floor loading, thermal, and airflow constraints when evidence suggests limits
      - Use risks_or_dependencies for constraints; use open_items for missing decisions that block SOW finalization
      - Flag de-rack custody, return path, or data-bearing asset handling risks when removal is included
      - Avoid implying operational acceptance when only physical install validation is in scope
      completion_criteria:
      - Define completion as devices installed in approved RU positions and secured with required mounting hardware
      - Require power connected to approved PDU outlets and A/B feeds when redundant power is in scope
      - Require patching completed according to approved patch matrix and cable_management_styles guidance
      - Require labels applied to devices, ports, cables, and cabinet positions using approved labeling_standards
      - Require cabinet photo set, rack elevation update, patch matrix update, and exception log when deliverable
      - Require inventory reconciliation of serials, asset tags, hostnames, and installed RU positions
      - Require power-on, link-light, console, or remote validation only when those tests are included
      - Require de-racked equipment staged, packaged, or handed off according to stated disposition path
      - Require documented customer acceptance or exception approval for deviations from rack elevations
      - Avoid defining completion by application availability, network reachability, or OS health unless scoped
      open_items:
      - Ask for final rack elevations with cabinet IDs, RU positions, device names, and blanking requirements
      - Ask for device inventory with model, serial, asset tag, weight, depth, power draw, and airflow direction
      - Ask for PDU class, power_phases, plug type, receptacle type, A/B feed map, and circuit ownership
      - Ask for patch matrix with source/destination ports, media type, connector type, cable color, and length
      - Ask who supplies rail kits, optics, transceivers, patch cords, labels, cage nuts, and tools
      - Ask for OOB, KVM, serial console, LOM, or remote validation requirements and contact information
      - Ask for access windows, escort policy, loading dock rules, staging area, and change control process
      - Ask for de-rack disposition, packaging, return shipping, ITAD handoff, and chain-of-custody rules
      - Ask for labeling_standards, cable_management_styles, and photo requirements before mobilization
      - Ask to resolve conflicts among BOM, shipment list, rack elevation, patch matrix, and meeting decisions
