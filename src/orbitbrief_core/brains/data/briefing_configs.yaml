      use_assumptions_for_supported_gaps_only: true
      use_open_items_for_missing_or_conflicting_data: true
      separate_endpoint_actions_from_managed_service_support: true
      preserve_user_device_site_wave_and_asset_detail: true
      treat_byod_disposition_and_migration_gaps_as_open_items: true
      differentiate_corporate_owned_from_user_owned_devices: true
      limit_output_to_nine_post_fields: true
