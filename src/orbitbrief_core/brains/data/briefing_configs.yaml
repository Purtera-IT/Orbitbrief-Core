        evidence_pattern: "quantity_claim packet with circuit count + scope_inclusion packet naming voltage class, UPS brand, and panel"
        pitfalls: "Do not infer Cat6/fiber drops or rack patching; structured cabling is low_voltage_cabling, not electrical."
      detailed_scope_of_services:
      - statement: "Pull branch circuits from LP-2, install A/B PDUs and the UPS, bond to the TGB per TIA-607, and load-test for commissioning sign-off."
        evidence_pattern: "scope_inclusion packet listing branch power/UPS activities + compliance_clause citing TIA-607 grounding and AHJ inspection"
        pitfalls: "Do not add generator or ATS scope unless a packet names the generator, fuel type, and transfer requirements."
      risks_or_dependencies:
      - statement: "Existing panelboard capacity is unverified and AHJ inspection windows are unconfirmed, either of which can add weeks via a subpanel or permit slip."
        evidence_pattern: "missing_info packet on panel capacity or permit/AHJ data + scope_inclusion packet naming new circuits"
        pitfalls: "Do not present available panel capacity or permit timing as assumptions when they can change schedule and cost."
      out_of_scope:
      - statement: "Low-voltage cabling, network configuration, generator supply, and mechanical cooling work are excluded."
        evidence_pattern: "scope_exclusion packet naming cabling/generator + scope_inclusion limited to branch power and UPS"
        pitfalls: "Do not exclude grounding/bonding if a packet ties the rack power scope to a TIA-607 grounding requirement."
  professional_services:
    display_name: Professional Services
    operating_rules:
      cite_phase: "Always cite the phase (discovery, assessment, design, workshop) and any deliverable artifact name (HLD, LLD, MoP, ATP, BOM)."
      separate_implementation: "Professional services scope is workshops, discovery, assessment, design output, and SOW authoring — not the install / cutover labor (which lives in the relevant infra pack)."
      acceptance: "Acceptance must reference signed deliverable (HLD/LLD/MoP/SOW), discovery report receipt, or workshop attendance + sign-off."
      preserve_units_as_shown: true
      treat_unanswered_questions_as_open_items: true
    normalization:
      deliverable_types: [HLD, LLD, MoP, ATP, "design package", "discovery report", "as-is assessment", "to-be design", "BOM", "RACI", "test plan"]
      phase_labels: [discovery, assessment, design, workshop, "design review", "design validation", "stakeholder workshop"]
      hour_units: ["hours", "person-hours", "labor hours", "billable hours"]
    fields: {}
    artifact_labels: ["Discovery report", "High-level design (HLD)", "Low-level design (LLD)", "Method of procedure (MoP)", "Workshop minutes", "Statement of work (SOW)"]
    subdomain_notes:
      - "Hours-based engagements (T&M / NTE) require a billable-hour cap and a rate sheet — flag if missing."
      - "Each deliverable should map to one acceptance criterion (HLD signed, LLD signed, etc.)."
      - "Workshops have a definite agenda + attendee list; missing either is an open_item."
      - "Design validation typically occurs before BOM finalization; capture the dependency."
    risk_patterns:
      - "Hours estimate doesn't include rework cycles when SME unavailable."
      - "Customer reschedules workshop; design slips, downstream BOM commit delayed."
      - "Deliverable acceptance ambiguous — 'review' vs 'sign-off' creates dispute."
      - "T&M cap reached before deliverable complete; change order required."
    compliance_frameworks:
      - "Customer engineering-standards / architecture-review-board sign-off."
    gold_examples:
      scope_overview:
      - statement: "Discovery and design engagement producing a signed HLD and LLD for a campus network refresh, capped at 240 billable hours."
        evidence_pattern: "scope_inclusion packet naming phase and deliverable artifacts (HLD/LLD) + pricing packet with hour cap/rate sheet"
        pitfalls: "Do not infer install or cutover labor; that lives in the relevant infra pack, not professional services."
      detailed_scope_of_services:
      - statement: "Run discovery workshops, document the as-is assessment, author the HLD and LLD, and validate the design before BOM finalization."
        evidence_pattern: "scope_inclusion packet listing discovery/design phases + deliverables packet naming HLD/LLD and design validation"
        pitfalls: "Do not add implementation, configuration, or MoP execution unless a packet names it as in scope."
      risks_or_dependencies:
      - statement: "Customer SME availability and workshop rescheduling drive rework cycles that can exhaust the T&M cap before deliverables are signed."
        evidence_pattern: "missing_info packet on SME/workshop scheduling + pricing packet naming the hours cap"
        pitfalls: "Do not present the hours estimate as covering rework when SME availability is unconfirmed."
      out_of_scope:
      - statement: "Implementation, install, cutover labor, and hands-on configuration are excluded; scope ends at signed design deliverables."
        evidence_pattern: "scope_exclusion packet naming implementation + scope_inclusion limited to discovery/design output"
        pitfalls: "Do not exclude the design package or SOW authoring when those are the named deliverables."
  audit:
    display_name: Audit and Site Readiness
    operating_rules:
      cite_evidence: "Every finding must cite a photo, walkthrough log entry, punch-list item, or test reading. Findings without evidence become open_items, not assumptions."
      separate_remediation: "Audit scope is observation, documentation, and gap reporting — remediation work belongs in the relevant infra pack (low_voltage_cabling, electrical, etc.) and must be flagged as a follow-on dependency."
      acceptance: "Acceptance must reference signed walkthrough report, photo log delivery, and a closed-out punch list."
      treat_unanswered_questions_as_open_items: true
    normalization:
      audit_types: ["site readiness", "as-built", "post-install QA", "pre-cutover", "punch-list close-out", "compliance audit"]
      severity_labels: [critical, major, minor, observational, informational]
      evidence_artifacts: ["photo log", "walkthrough notes", "punch-list spreadsheet", "test reading", "label inventory"]
    fields: {}
    artifact_labels: ["Site readiness report", "As-built drawing red-line", "Photo log", "Punch list", "Walkthrough sign-off sheet"]
    subdomain_notes:
      - "Photo evidence is the bedrock — every critical / major finding must have at least one photo locator."
      - "Punch-list items must include severity + responsible party + target close date."
      - "Capture any compliance regime (NFPA, BICSI, OSHA, AHJ) the audit is grounded in."
      - "As-built deltas (planned vs installed) are often the highest-value output; surface them prominently in scope_overview."
    risk_patterns:
      - "Inaccessible areas during walkthrough — critical findings missed."
      - "Photo evidence lost / unlabeled — punch-list disputes during closeout."
      - "Severity disagreement with customer — punch list re-opens after sign-off."
      - "AHJ change between audit and remediation — code reference moves."
    compliance_frameworks:
      - "NFPA / OSHA / BICSI / AHJ findings codified per local jurisdiction."
      - "TIA-606-C labeling / TIA-568.2-D test result audit criteria."
    gold_examples:
      scope_overview:
      - statement: "Post-install QA walkthrough of 3 floors capturing a photo log and a severity-ranked punch list against the as-built drawings."
        evidence_pattern: "scope_inclusion packet naming audit type + quantity_claim packet with floor/area count"
        pitfalls: "Do not infer remediation work; audit scope is observation and gap reporting only."
      detailed_scope_of_services:
      - statement: "Walk each area, photo-document findings, record planned-vs-installed as-built deltas, and assign severity, responsible party, and target close date per punch-list item."
        evidence_pattern: "scope_inclusion packet listing walkthrough/documentation activities + compliance_clause naming photo-log and punch-list evidence"
        pitfalls: "Do not add fixes or corrective labor; remediation belongs to the relevant infra pack as a follow-on dependency."
      risks_or_dependencies:
      - statement: "Inaccessible areas during the walkthrough and unlabeled photo evidence may cause missed critical findings and punch-list disputes at closeout."
        evidence_pattern: "missing_info packet on area access + scope_inclusion packet naming photo-log evidence requirement"
        pitfalls: "Do not record an unverifiable finding as an assumption; findings without evidence are open_items."
      out_of_scope:
      - statement: "Remediation of any finding, corrective installation, and re-testing of failed items are excluded; this is observation and reporting only."
        evidence_pattern: "scope_exclusion packet naming remediation + scope_inclusion limited to audit/documentation"
        pitfalls: "Do not exclude the as-built red-line if the source names it as a deliverable of the audit."
  staff_augmentation:
    display_name: Staff Augmentation
    operating_rules:
      bodies_not_outcomes: "Staff aug sells qualified labor hours against a rate card / SOW, NOT a fixed deliverable. Anchor scope on roles, headcount, hours/shift coverage, and supervision model - never imply turnkey outcomes the customer owns."
      rate_card: "Always surface the rate card: role, bill rate, OT/holiday multiplier, minimum-hours/cancellation terms, and prevailing-wage or union classification when present."
      clearance_gating: "If the role needs a clearance/badge/background check, treat the clearance lead time as a schedule dependency that gates the start date - call it out explicitly."
      acceptance: "Acceptance is timesheet/attendance + supervisor sign-off, not a punch list. Flag missing approval/rejection workflow as an open item."
    normalization:
      engagement_models: ["onsite field surge", "cleared / specialty resources", "managed staffing", "T&M", "dedicated team"]
      rate_modifiers: ["straight time", "overtime", "double time", "holiday", "shift differential", "prevailing wage", "union scale"]
    fields: {}
    artifact_labels: ["Rate card", "Resource roster", "Coverage schedule", "Timesheet template"]
    subdomain_notes:
      - "Onsite field surge and cleared/specialty resources are the two common shapes; cleared work adds clearance + escort dependencies."
      - "Distinct from professional_services: staff aug supplies bodies under customer direction; professional_services owns an outcome."
      - "Capture shift pattern, coverage window (e.g. 24x7 vs business hours), and ramp/attrition assumptions."
    risk_patterns:
      - "Clearance / background-check lead time slips the start date."
      - "Resource no-show or attrition mid-engagement; backfill SLA undefined."
      - "Scope creep beyond the SOW hours with no change-order trigger."
      - "Prevailing-wage / union classification mismatch creates billing dispute."
      - "Customer fails to provide direction/equipment, leaving billable resources idle."
    compliance_frameworks:
      - "Prevailing wage (Davis-Bacon) / union collective-bargaining classification where applicable."
      - "Background-check / clearance regime (facility security officer, escort requirements)."
    gold_examples:
      scope_overview:
      - statement: "Provide 6 cleared low-voltage technicians on a 24x7 two-shift coverage model under customer supervision against the rate card."
        evidence_pattern: "quantity_claim packet with headcount/shift coverage + pricing packet naming rate card and clearance requirement"
        pitfalls: "Do not imply turnkey outcomes; staff aug supplies labor hours under customer direction, not a fixed deliverable."
      detailed_scope_of_services:
      - statement: "Staff the coverage schedule, track straight-time and overtime hours on the timesheet template, and submit weekly attendance for supervisor sign-off."
        evidence_pattern: "scope_inclusion packet listing roles/coverage + pricing packet naming rate modifiers and timesheet acceptance"
        pitfalls: "Do not add scoped engineering outcomes or deliverables the customer owns under their own direction."
      risks_or_dependencies:
      - statement: "Clearance and background-check lead time gates the start date, and undefined backfill SLA risks coverage gaps on no-shows or attrition."
        evidence_pattern: "missing_info packet on clearance lead time or backfill terms + scope_inclusion packet naming cleared roles"
        pitfalls: "Do not treat clearance timing as an assumption when it determines when billable resources can start."
      out_of_scope:
      - statement: "Fixed deliverables, outcome guarantees, equipment supply, and direction of the work are excluded; the customer supervises and directs the resources."
        evidence_pattern: "scope_exclusion packet naming outcomes/equipment + scope_inclusion limited to labor hours under customer direction"
        pitfalls: "Do not exclude the rate-card modifiers (OT, prevailing wage, union scale) when the source defines them as billable terms."

  security_access:
    display_name: Security / Access Control
    operating_rules:
      door_schedule: "Anchor scope on the door/opening schedule: each opening's reader type, lock hardware (strike/maglock/mortise), REX, door position switch, and fail-safe vs fail-secure behavior."
      egress_code: "Fail-safe vs fail-secure is a life-safety decision - every maglock must release on fire alarm and on egress. Flag any opening where the egress/fire-release path is unstated as a blocker."
      credential_migration: "When integrating with an existing access-control system, capture the panel/controller make (e.g. Lenel, Genetec, Software House, Avigilon), credential technology (prox vs iCLASS/SEOS/mobile), and the cardholder migration plan."
      acceptance: "Acceptance must reference a door-by-door functional test (badge grant/deny, REX, forced/held alarms) and integration to the fire alarm for release."
    normalization:
      panels: ["Lenel OnGuard", "Genetec Synergis", "Software House C-CURE", "Avigilon ACM", "Brivo", "Openpath", "AMAG"]
      credential_tech: ["125kHz prox", "iCLASS SE", "SEOS", "MIFARE DESFire", "mobile credential", "biometric"]
      lock_types: ["electric strike", "maglock", "electrified mortise", "electrified panic", "delayed egress"]
    fields: {}
    artifact_labels: ["Door schedule / hardware schedule", "Access control riser", "Cardholder migration plan", "Functional test sheet"]
    subdomain_notes:
      - "Badging/credentialing, door hardware, and integration to existing ACS are the recurring scope blocks."
      - "Distinct from security_camera: this is access control / door hardware, not surveillance/VMS."
      - "Capture power supply / PoE budget for locks and the head-end controller location."
    risk_patterns:
      - "Door hardware (electrified) long lead time slips the cutover."
      - "Fail-safe/fail-secure and fire-release behavior unspecified - life-safety / AHJ failure."
      - "Credential migration breaks existing cardholders during cutover."
      - "Existing panel firmware/license can't accept new controllers."
      - "Egress code (IBC/NFPA 101) violation on delayed-egress or maglock openings."
    compliance_frameworks:
      - "NFPA 101 Life Safety Code / IBC egress requirements for electrified openings."
      - "ADA hardware mounting/operation; UL 294 access-control system standard."
    gold_examples:
      scope_overview:
      - statement: "Access-control cutover for 24 openings integrating electrified hardware to an existing Lenel OnGuard panel with iCLASS SE credentials."
        evidence_pattern: "quantity_claim packet with opening count + scope_inclusion packet naming panel make and credential technology"
        pitfalls: "Do not infer surveillance/VMS work; this is access control and door hardware, not cameras."
      detailed_scope_of_services:
      - statement: "Install readers, electric strikes/maglocks, REX, and door-position switches per the door schedule, wire fire-alarm release, and migrate cardholders to the existing panel."
        evidence_pattern: "scope_inclusion packet listing door-hardware activities + door-schedule packet naming reader/lock/REX per opening"
        pitfalls: "Do not assume fail-safe vs fail-secure behavior; an unstated egress/fire-release path is a blocker, not a default."
      risks_or_dependencies:
      - statement: "Long-lead electrified hardware and an existing panel firmware/license limit may slip the cutover and break existing cardholders during migration."
        evidence_pattern: "missing_info packet on hardware lead time or panel firmware/license + scope_inclusion packet naming the migration"
        pitfalls: "Do not present panel capacity for new controllers as assumed when firmware/license headroom is unverified."
      out_of_scope:
      - statement: "Surveillance cameras/VMS, door cabling, power supply provisioning, and any opening without a defined fire-release path are excluded."
        evidence_pattern: "scope_exclusion packet naming VMS/cabling + scope_inclusion limited to access control and door hardware"
        pitfalls: "Do not exclude fire-alarm release integration; for maglock openings it is a mandatory life-safety inclusion."

  paging_mass_notification:
    display_name: Paging and Mass Notification
    operating_rules:
      zones_and_intelligibility: "Anchor scope on paging zones, speaker layout, and intelligibility (STI/CIS) targets per area - coverage without an intelligibility criterion is incomplete."
      ecs_code: "Emergency / mass-notification audio is a code system (NFPA 72 Chapter 24 ECS). If the system carries emergency messaging it must meet ECS survivability/priority, and fire-alarm audio takes priority over paging."
      integration: "Capture integration points: fire alarm panel (priority override), bell/PA schedules, SIP/UC paging, and any mass-notification platform (Informacast, Alertus, Singlewire)."
      acceptance: "Acceptance must reference an intelligibility measurement per zone and a priority/override test against the fire alarm."
    normalization:
      platforms: ["Informacast", "Singlewire", "Alertus", "Valcom", "Bogen", "Atlas IED", "Syn-Apps"]
      message_classes: ["routine paging", "bell schedule", "emergency / mass notification", "lockdown", "weather alert"]
    fields: {}
    artifact_labels: ["Speaker coverage / zone plan", "Intelligibility test results", "Message matrix", "Priority/override test sheet"]
    subdomain_notes:
      - "Paging/intercom, mass notification/emergency alerting, and bell/PA schedules are the three recurring shapes."
      - "Emergency messaging pulls in NFPA 72 ECS obligations; routine paging does not - classify early."
      - "Capture IP vs analog paging and integration with the phone/UC system."
    risk_patterns:
      - "Intelligibility (STI) fails acceptance in reverberant/high-ceiling spaces."
      - "AHJ rejects ECS messaging that doesn't meet NFPA 72 Ch.24 survivability/priority."
      - "Fire-alarm priority/override not wired - paging overrides life-safety audio."
      - "Bell/clock schedule fails to sync across IDFs / time source."
      - "Mass-notification platform license/integration gap leaves alerting partial."
    compliance_frameworks:
      - "NFPA 72 Chapter 24 Emergency Communications Systems (where emergency messaging is in scope)."
      - "ADA visible-notification (strobe) requirements for alerting in occupiable spaces."
    gold_examples:
      scope_overview:
      - statement: "Deploy InformaCast emergency mass notification across 9 paging zones with an STI intelligibility target and fire-alarm priority override per NFPA 72 Ch.24."
        evidence_pattern: "quantity_claim packet with zone/speaker counts + scope_inclusion packet naming platform and ECS classification"
        pitfalls: "Do not infer routine paging obligations as ECS, or ECS-grade work for routine paging; classify the message class first."
      detailed_scope_of_services:
      - statement: "Lay out speaker coverage per zone, configure the message matrix and bell schedule, wire fire-alarm priority override, and measure intelligibility per area."
        evidence_pattern: "scope_inclusion packet listing zone/speaker activities + compliance_clause naming intelligibility test and priority/override test"
        pitfalls: "Do not add ECS survivability scope unless the system is classified as emergency/mass-notification messaging."
      risks_or_dependencies:
      - statement: "Reverberant high-ceiling spaces may fail STI intelligibility at acceptance, and an unwired fire-alarm priority override would let paging override life-safety audio."
        evidence_pattern: "missing_info packet on ceiling/acoustics or fire-alarm integration + scope_inclusion packet naming intelligibility target"
        pitfalls: "Do not present intelligibility pass as assumed in difficult acoustic spaces; it is a measured acceptance gate."
      out_of_scope:
      - statement: "Speaker cabling, fire-alarm panel modifications, and UC/SIP platform changes are excluded unless explicitly bundled."
        evidence_pattern: "scope_exclusion packet naming cabling/fire-panel + scope_inclusion limited to paging/notification configuration"
        pitfalls: "Do not exclude the fire-alarm priority/override path when emergency messaging is in scope; NFPA 72 Ch.24 requires it."

  fire_safety:
    display_name: Fire Safety and Alarm
    operating_rules:
      code_and_ahj: "Fire alarm work is permit-and-inspection gated. Always surface the NFPA 72 edition in force, the Authority Having Jurisdiction (AHJ), and the permit/acceptance-test path - an unstated AHJ acceptance is a blocker, not a warning."
      licensed_labor: "Installation and ITM must be by licensed/certified fire-alarm technicians; flag any scope that implies unlicensed labor or skips required certification."
      secondary_power: "Capture the panel make/model, device counts, and the secondary-power (battery) calculation requirement - battery sizing and survivability are common acceptance gates."
      acceptance: "Acceptance must reference an AHJ acceptance test, a record-of-completion, and a 100% device functional test - not a generic sign-off."
    normalization:
      panels: ["Notifier", "Simplex", "Edwards EST", "Honeywell Silent Knight", "Fire-Lite", "Gamewell-FCI", "Siemens"]
      device_classes: ["smoke detector", "heat detector", "pull station", "notification appliance (horn/strobe)", "duct detector", "monitor/control module", "aspirating detection"]
      monitoring: ["central station (UL listed)", "DACT", "cellular communicator", "IP communicator"]
    fields: {}
    artifact_labels: ["Fire alarm device schedule", "Battery calculation", "Record of completion (NFPA 72)", "AHJ acceptance test report"]
    subdomain_notes:
      - "Fire alarm panel, smoke/heat detection, and notification appliances are the core scope blocks."
      - "ITM (inspection, testing, maintenance) recurring contracts are distinct from new install - classify which one."
      - "Capture monitoring path (central station) and the AHJ + code edition early; they drive the whole schedule."
    risk_patterns:
      - "AHJ permit / acceptance-test scheduling slips Certificate of Occupancy."
      - "Code edition (NFPA 72) in force differs from design assumption - rework."
      - "Battery / secondary-power calculation fails survivability requirement."
      - "Notification appliance coverage/candela fails ADA visible-signaling test."
      - "Central-station monitoring transition leaves a window with no monitoring."
    compliance_frameworks:
      - "NFPA 72 National Fire Alarm and Signaling Code (edition per AHJ)."
      - "NFPA 101 Life Safety Code; UL 864 control-unit listing; local AHJ amendments."
      - "ADA / NFPA 72 visible (strobe) notification candela requirements."
    gold_examples:
      scope_overview:
      - statement: "Replace a Notifier NFS2-3030 panel and 64 addressable smoke detectors with central-station monitoring, AHJ-permitted under NFPA 72."
        evidence_pattern: "quantity_claim packet with panel/device counts + scope_inclusion packet naming panel make and monitoring path"
        pitfalls: "Do not treat an unstated AHJ and code edition as resolved; they gate the permit and acceptance path."
      detailed_scope_of_services:
      - statement: "Install the addressable panel and devices with licensed fire-alarm technicians, run the secondary-power battery calculation, and complete a 100% functional and AHJ acceptance test."
        evidence_pattern: "scope_inclusion packet listing panel/device activities + compliance_clause naming battery calculation and AHJ acceptance test"
        pitfalls: "Do not imply unlicensed labor or a generic sign-off; installation and ITM require certified technicians and an AHJ acceptance test."
      risks_or_dependencies:
      - statement: "AHJ permit and acceptance-test scheduling can slip the Certificate of Occupancy, and a code-edition mismatch or undersized battery calculation forces rework."
        evidence_pattern: "missing_info packet on AHJ/code edition or battery sizing + scope_inclusion packet naming the panel/device install"
        pitfalls: "Do not present the NFPA 72 edition in force as assumed; an edition mismatch with design causes rework."
      out_of_scope:
      - statement: "Device cabling outside the panel, sprinkler/suppression work, and central-station contract setup are excluded unless explicitly included."
        evidence_pattern: "scope_exclusion packet naming cabling/suppression + scope_inclusion limited to fire-alarm panel and devices"
        pitfalls: "Do not exclude the AHJ acceptance test or record of completion; they are mandatory acceptance gates, not optional."

  das:
    display_name: Distributed Antenna System (DAS)
    operating_rules:
      carrier_or_publicsafety: "Classify first: cellular DAS needs carrier (NOC) approval + RF source; public-safety DAS/ERRCS is AHJ/fire-code gated. The approval body and timeline differ completely - never conflate them."
      rf_design: "Anchor scope on the RF design: iBwave/predictive model, donor source (off-air vs small cell/BTS), antenna/coax/fiber layout, and a grid/walk-test acceptance plan. Coverage without a measured acceptance grid is incomplete."
      publicsafety_code: "Public-safety/ERRCS work must cite NFPA 1221/1225 (or IFC 510), required coverage %, battery/secondary power, and AHJ acceptance - flag any of these missing as a blocker."
      acceptance: "Acceptance must reference a measured grid/walk test (DL/UL signal, DAQ for public safety) signed by the carrier or AHJ, not a visual inspection."
    normalization:
      das_classes: ["public safety DAS / ERRCS", "cellular DAS", "active DAS", "passive DAS / hybrid"]
      donor_sources: ["off-air donor (rooftop antenna)", "small cell", "carrier BTS", "BDA / signal booster"]
