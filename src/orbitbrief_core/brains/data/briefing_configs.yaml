    subdomain_notes:
    - test AP availability, mount approach, temporary power/switching, validation outputs
    - survey scope, floorplan quality, AP model assumptions, RF obstacles, deliverables
    - post-install validation need, pass/fail thresholds, remediation linkage
    - scaled plans, material assumptions, ceiling heights, predictive-only limitations
    - distance / out-of-scope caps, explicit boundary language, exceptions
    - coverage vs capacity target, voice/scanner density, AP model, controller/cloud
    - mounting type, lift/safety, ceiling structure, install-by-others boundary
    gold_examples:
      scope_overview:
      - statement: Predictive wireless survey for 12 office buildings with onsite validation of priority areas.
        evidence_pattern: scope_inclusion packet with survey type + quantity_claim packet with building count
        pitfalls: Do not infer AP installation or controller configuration unless packets cite those services.
      detailed_scope_of_services:
      - statement: Model WLAN coverage from supplied floor plans and validate assumptions during onsite walk-through.
        evidence_pattern: scope_inclusion packet naming predictive survey + site_access packet for onsite access
        pitfalls: Do not add spectrum analysis, AP-on-a-stick, or remediation unless specifically supported.
      deliverables:
      - statement: Wireless survey report with heat maps, AP placement notes, and remediation recommendations.
        evidence_pattern: scope_inclusion packet listing report outputs + compliance_clause with coverage targets
        pitfalls: Do not promise installed APs, controller changes, or CAD files unless named in source packets.
      assumptions:
      - statement: Customer-provided floor plans are current enough to support predictive modeling.
        evidence_pattern: scope_inclusion packet referencing floor plans but no current-state verification packet
        pitfalls: Use open_items if floor plan availability or accuracy is explicitly missing or disputed.
      customer_responsibilities:
      - statement: Provide current floor plans, site escorts, and access to representative survey areas.
        evidence_pattern: site_access packet + missing_info packet requesting drawings or access details
        pitfalls: Do not require customer to provide technical outputs that provider scope includes.
      out_of_scope:
      - statement: AP mounting, cabling, switch configuration, and production WLAN cutover are excluded.
        evidence_pattern: scope_exclusion packet naming deployment services or scope limited to survey/design
        pitfalls: Do not exclude AP work if the BriefState activates wireless deployment or cabling scope.
      risks_or_dependencies:
      - statement: Unknown ceiling heights and RF obstructions may affect AP count and remediation accuracy.
        evidence_pattern: missing_info packet on ceiling height + site_access packet limiting survey areas
        pitfalls: Do not present unknown site conditions as assumptions when they can change pricing or schedule.
      completion_criteria:
      - statement: Survey is complete when modeled findings and agreed report outputs are delivered for scoped areas.
        evidence_pattern: scope_inclusion packet with survey area + deliverables packet naming final report
        pitfalls: Do not define completion by end-user WLAN performance unless post-install validation is in scope.
      open_items:
      - statement: Confirm whether post-install passive validation is required after AP deployment by others.
        evidence_pattern: missing_info packet or meeting_decision packet leaving validation timing unresolved
        pitfalls: Do not convert a missing validation decision into an assumed deliverable.
    risk_patterns:
      - "Predictive survey doesn't match real RF environment after install (warehouse / hospital / metal-heavy)."
      - "Channel plan collisions with neighboring tenants / public Wi-Fi."
      - "AP power budget exceeds available PoE switch capacity."
      - "Mounting heights / aesthetic constraints invalidate predictive model."
      - "Regulatory power constraints (DFS / TPC) by region prevent expected throughput."
    compliance_frameworks:
      - "FCC Part 15 / regional regulatory limits (DFS, TPC) on power and band usage."
      - "HIPAA / PCI when WLAN carries patient or payment traffic — segmentation required."
  low_voltage_cabling:
    display_name: Low Voltage Cabling
    operating_rules:
      do_not_invent_facts: true
      use_assumptions_for_supported_gaps_only: true
      use_open_items_for_missing_or_conflicting_data: true
      quantify_drops_per_room_when_possible: true
      prefer_certification_standards_over_vendor_brand_names: true
      distinguish_existing_reuse_from_new_install: true
      treat_pathway_power_and_permit_gaps_as_open_items: true
      limit_output_to_nine_post_fields: true
    normalization:
      cable_categories:
      - Cat3
      - Cat5e
      - Cat6
      - Cat6a
      - Cat7
      - Cat8
      - coax RG6
      - speaker cable
      - 18/2
      - 22/4
      - OM3
      - OM4
      - OM5
      - OS2
      termination_types:
      - RJ45 jack
      - RJ45 plug
      - patch panel
      - biscuit jack
      - surface box
      - 110 block
      - 66 block
      - fiber LC
      - fiber SC
      - fiber ST
      - fiber MTP/MPO
      - coax F-connector
      pathway_types:
      - J-hook
      - conduit
      - EMT
      - cable tray
      - ladder rack
      - surface raceway
      - innerduct
      - plenum
      - riser
      - poke-through
      - sleeve
      - basket tray
      - underfloor
      certification_standards:
      - TIA-568.2-D
      - TIA-568.3-D
      - ANSI/TIA-606-C labeling
      - ANSI/TIA-607-D bonding
      - BICSI ITSIMM
      - NEC plenum requirements
      - UL-listed firestop
      test_result_formats:
      - Fluke LinkWare
      - Versiv PDF
      - OTDR trace
      - loss budget table
      - continuity report
      - copper certification PDF
      - fiber certification PDF
      common_low_voltage_terms:
        IDF: intermediate distribution frame
        MDF: main distribution frame
        DMARC: demarcation point
        MPOE: minimum point of entry
        UTP: unshielded twisted pair
        STP: shielded twisted pair
        CMP: communications plenum cable
        CMR: communications riser cable
        MUTOA: multi-user telecommunications outlet assembly
        PoE: power over Ethernet
        AHJ: authority having jurisdiction
        ICRA: infection control risk assessment
        JHA: job hazard analysis
        OTDR: optical time-domain reflectometer
        MPTL: modular plug terminated link
    fields:
      scope_overview:
      - Summarize cabling scope by site, building, floor, and MDF/IDF areas when supported
      - State drop counts, strand counts, rooms, zones, and closet counts when evidence provides them
      - Distinguish new installation, existing-cable reuse, re-termination, re-certification, and remediation work
      - Use cable_categories and termination_types wording instead of vague network cabling when details exist
      - Call out ICRA, plenum, firestop, after-hours, or regulated-space work only when supported
      - State whether pathway work is included, by-others, or unresolved; never assume J-hooks or conduit exist
      - Identify the intended outcome, such as certified drops, AP/camera cabling, or MDF/IDF extension
      - Avoid mixing cabling with AP config, camera programming, or switch setup unless included
      detailed_scope_of_services:
      - Differentiate copper drops, fiber runs, coax, speaker/security cable, DMARC extension, and IDF/MDF homeruns
      - List per-site, per-floor, per-room, and per-IDF quantities when packet evidence supports that detail
      - Identify cable_categories such as Cat6, Cat6a, OM4, or OS2 and preserve strand, pair, and count units
      - Specify termination_types at both ends, including jack, patch panel, 110 block, LC, SC, or MTP/MPO
      - State pathway_types per run when known, and separate pathway survey from pathway construction
      - Include pull, dress, terminate, label, test, certify, remediate, and closeout activities only when scoped
      - Call out DMARC/MPOE-to-MDF extensions separately from MDF-to-IDF riser or horizontal cabling
      - Identify firestopping, sleeve use, ladder rack, grounding, bonding, or plenum requirements only when supported
      - Specify certification_standards, including TIA-568.2-D for copper and TIA-568.3-D for fiber
      - Differentiate existing cable reuse from new install and state whether re-certification is required
      - Include ICRA barriers, lift use, ceiling access, or above-ceiling work as separate execution tasks
      - Avoid adding switch configuration, AP mounting, camera commissioning, or ISP circuit work unless cited
      deliverables:
      - List as-built drawings separately from installation photos, label exports, and certification reports
      - Differentiate copper certification PDFs, fiber certification PDFs, OTDR traces, and loss budget tables
      - Use test_result_formats names such as Fluke LinkWare or Versiv PDF only when the source names them
      - Include label schedule or export when ANSI/TIA-606-C labeling or closet-to-jack mapping is scoped
      - Include redlined floor plans, riser diagrams, and MDF/IDF maps only when the source requests them
      - 'Include closeout contents: photos, test results, as-builts, patch maps, and exceptions list'
      - Avoid calling pulled cable a deliverable; describe the installed, tested cabling plant instead
      - Flag undefined closeout formats in open_items instead of inventing PDF, CSV, or native CAD files
      - Separate customer handoff artifacts from internal QA notes, material lists, or installer tickets
      assumptions:
      - Use assumptions only for supported estimating basis, such as accessible ceilings shown in drawings
      - State pathway availability only when existing pathways are referenced but not validated
      - State customer-provided access, escorts, badges, and work windows only when context implies dependency
      - Do not assume riser sleeve capacity, firestop approval, or pathway fill margin without evidence
      - Do not assume cable_categories, strand counts, or termination_types when quantities conflict or are missing
      - Treat plenum, ICRA, lift, permit, and AHJ requirements as open_items unless explicitly defined
      - Separate reusable existing cabling from re-certification assumptions and make both testable
      - State material lead-time assumptions only when customer or packet context references owner-furnished material
      - Avoid assuming patch panels, racks, grounding, or closet space exist beyond cited current state
      - Move contradictions between drawings, spreadsheets, and meeting notes to open_items, not assumptions
      customer_responsibilities:
      - List required floor plans, reflected ceiling plans, riser diagrams, rack elevations, and room matrices
      - Require confirmation of drop counts by room, outlet type, IDF/MDF home closet, and label scheme
      - Require access to MDF, IDFs, ceilings, risers, shafts, telecom rooms, tenant spaces, and secured areas
      - Require approval for pathway use, penetrations, coring, sleeves, firestopping, and after-hours work
      - Require escorts, badges, lifts, infection-control approvals, and parking or loading access
      - Require outage coordination when terminations, cutovers, or reuse testing may affect live services
      - Require owner-furnished patch panels, racks, switches, or materials onsite when excluded from provider scope
      - Require facility confirmation of plenum, ICRA, NEC, AHJ, and site safety constraints before mobilization
      - Require workspace readiness at rooms, cubicles, ceilings, and telecom closets before technicians arrive
      - Avoid assigning customer tasks that are clearly provider-owned, such as certification testing if scoped
      out_of_scope:
      - Exclude conduit, coring, trenching, pathway construction, or cable tray unless packet evidence includes it
      - Exclude electrical power, PoE switch supply, UPS, grounding bars, and bonding unless included
      - Exclude ISP circuit ordering, carrier coordination, and DMARC handoff changes unless explicitly cited
      - Exclude AP, camera, phone, access control, AV, or switch configuration unless included
      - Exclude patching active equipment unless scope includes patch cords, switch ports, or cutover support
      - Exclude certification of existing cabling when reuse is stated but re-test scope is absent
      - Exclude hazardous material abatement, fire alarm work, sprinkler work, and structural engineering unless included
      - Exclude after-hours, lift rental, ICRA barriers, permits, and firestop inspections unless scoped
      - Do not exclude fiber pulls if fiber is included under another packet or domain; reconcile first
      - Avoid generic exclusions like anything not stated; write concrete boundaries tied to cited gaps
      risks_or_dependencies:
      - Call out missing drop counts, room maps, IDF assignments, pathway routes, or termination details as pricing risk
      - Identify conflicts between RFP, drawings, room matrix, and meeting decisions as quantity_conflict dependencies
      - Flag unknown pathway fill, above-ceiling access, riser capacity, sleeve availability, and plenum rating
      - Flag ICRA, AHJ, permit, firestop, lift, escort, or after-hours requirements that may affect schedule
      - State risk when existing cabling condition or label accuracy is unverified but reuse is contemplated
      - Identify supply risks for specialty cable_categories, fiber connectors, patch panels, or firestop materials
      - Call out dependency on customer network gear when patching, cutover, or live circuit migration is included
      - Note occupied-space risks affecting productivity, noise limits, cleanup, and room availability
      - Avoid treating code compliance as guaranteed; list standards only as requirements or dependencies
      - Use risks_or_dependencies for partial evidence, and open_items for specific missing decisions
      - Flag healthcare, laboratory, industrial, or secure-site access constraints when evidence supports them
      - Call out test failure and rework risk when existing cable reuse or failed-test handling is undefined
      completion_criteria:
      - Define completion as installation, dressing, labeling, and testing of scoped runs by approved count
      - Require passing certification to cited certification_standards for each scoped copper or fiber link
      - Require delivery of as-builts, label export, test reports, photos, and exception log when promised
      - Require remediation or documented exception for any failed cable test covered by provider scope
      - Tie completion to customer acceptance of closeout package, not business outcomes like app performance
      - Include closet cleanup, patch panel labeling, faceplate labeling, and cable management when scoped
      - Include firestop restoration or inspection evidence when penetrations and firestopping are included
      - Include debris removal only when cleanup, demolition, or material removal is in scope
      - Avoid declaring completion on device commissioning unless AP, camera, phone, or switch work is included
      - Use objective counts, locations, labels, and test results instead of vague all work completed wording
      open_items:
      - Ask for final drop count by room, outlet type, cable_categories, and IDF/MDF home closet per location
      - Ask for pathway responsibility, pathway capacity, ceiling height, plenum rating, and lift requirements
      - Ask for riser route, sleeve availability, firestop expectations, penetration permits, and AHJ constraints
      - Ask for termination_types, patch panel capacity, faceplate configuration, and label format
      - Ask for fiber strand count, connector type, loss budget, OTDR requirement, and handoff point
      - Ask whether existing cabling reuse requires continuity testing, certification, remediation, or no provider test
      - Ask for ICRA, infection-control, badging, escort, after-hours, and site safety requirements
      - Ask for closeout format for as-builts, label export, certification files, and photo set
      - 'Ask which scopes are by-others: conduit, electrical, switch config, device install, and carrier services'
      - Ask to resolve conflicts among drawings, spreadsheets, RFP notes, and meeting decisions before final SOW
