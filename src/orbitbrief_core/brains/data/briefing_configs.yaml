      cite_circuit: "Always cite the panelboard / breaker / circuit number and amperage when the source provides them."
      separate_low_voltage: "120/208/277/480 V branch power, UPS, generators, transfer switches, grounding, and bonding belong here. Cat6 / Cat6A / fiber drops are low_voltage_cabling, not electrical."
