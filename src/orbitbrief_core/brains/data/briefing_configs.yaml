      - "Grounding / bonding scope follows TIA-607 / J-STD-607 — cite the standard when applicable."
    risk_patterns:
      - "Permit timeline slip — AHJ inspection availability windows."
      - "Existing panel out of capacity; subpanel install adds weeks."
      - "Load study undersized; UPS runtime misses target."
      - "ATS coordination missed during cutover; transfer time exceeds critical-load tolerance."
      - "Grounding compliance gap with TIA-607 / J-STD-607."
    compliance_frameworks:
