  telecom:
    display_name: Telecom
    operating_rules:
      circuit_dependencies: "For carrier circuit / WAN turn-up, anchor on the LOA/CFA, demarc location, circuit IDs, and the carrier FOC date - the FOC date gates the cutover and is the single biggest schedule risk."
      porting: "For UCaaS/VoIP with number porting, capture the porting inventory, losing carrier, CSR, and the porting FOC date; partial-port and reject scenarios must have a rollback plan."
      e911: "If voice is in scope, E911 dispatchable-location and Kari's Law / RAY BAUM's Act compliance is mandatory - flag any voice scope that omits E911 location/notification as a blocker."
      acceptance: "Acceptance must reference circuit turn-up test (or call-quality/MOS for VoIP) and a verified E911 test call where voice is in scope."
    normalization:
      circuit_types: ["DIA / dedicated internet", "MPLS", "SD-WAN underlay", "point-to-point", "POTS replacement", "SIP trunk", "PRI"]
      voice_platforms: ["Webex Calling", "Teams Phone", "RingCentral", "Zoom Phone", "8x8", "on-prem PBX"]
      port_artifacts: ["LOA", "CFA", "CSR", "FOC", "demarc extension"]
    fields: {}
    artifact_labels: ["Circuit / demarc schedule", "Porting inventory + FOC", "E911 dispatchable-location table", "Turn-up / MOS test results"]
    subdomain_notes:
      - "Carrier circuit/demarc/WAN turn-up, UCaaS/VoIP rollout/porting, and E911 are the three recurring shapes."
      - "Carrier-dependent dates (FOC) are outside the integrator's control - surface them as external dependencies."
      - "Capture demarc extension / inside-wiring responsibility (carrier vs integrator) - a frequent gap."
    risk_patterns:
      - "Carrier FOC date slips and cascades the whole cutover schedule."
      - "Number port rejected (CSR mismatch) or partial-ports, splitting service."
      - "E911 dispatchable-location / Kari's Law / RAY BAUM non-compliance."
      - "Demarc extension / inside-wiring responsibility unassigned at turn-up."
      - "SIP/VoIP call quality (MOS/jitter) fails over an undersized or untagged WAN."
    compliance_frameworks:
      - "Kari's Law (direct 911 dial + notification) and RAY BAUM's Act (dispatchable location)."
      - "FCC number-porting (LNP) rules; state PUC tariff where applicable."
    gold_examples:
      scope_overview:
      - statement: "Cutover 14 sites from POTS to SIP trunks on Webex Calling, including number porting and E911 dispatchable-location setup."
        evidence_pattern: "quantity_claim packet with site/circuit counts + scope_inclusion packet naming circuit type, voice platform, and porting"
        pitfalls: "Do not infer inside-wiring or demarc-extension responsibility unless a packet assigns it to the integrator."
      detailed_scope_of_services:
      - statement: "Coordinate LOA/CFA and FOC dates, provision SIP trunks, port numbers per the porting inventory, configure E911 dispatchable location, and run turn-up MOS testing."
        evidence_pattern: "scope_inclusion packet listing circuit/porting/E911 activities + compliance_clause naming turn-up/MOS test and E911 test call"
        pitfalls: "Do not omit E911 location/notification when voice is in scope; Kari's Law and RAY BAUM's Act make it mandatory."
      risks_or_dependencies:
      - statement: "A slipped carrier FOC date and CSR-mismatch port rejections are external dependencies that can cascade the cutover schedule and split service."
        evidence_pattern: "missing_info packet on FOC date or CSR/porting inventory + scope_inclusion packet naming the cutover"
        pitfalls: "Do not present carrier FOC dates as controllable; surface them as external dependencies with a rollback plan."
      out_of_scope:
      - statement: "Inside-wiring and demarc extension by the carrier, WAN underlay sizing, and on-prem PBX hardware are excluded unless explicitly included."
        evidence_pattern: "scope_exclusion packet naming inside-wiring/WAN + scope_inclusion limited to circuit/VoIP turn-up and porting"
        pitfalls: "Do not exclude E911 dispatchable-location configuration when voice is in scope; it is a mandatory compliance inclusion."
