    gold_examples:
      scope_overview:
      - statement: Laptop refresh for 220 corporate users across HQ and three branches using Autopilot enrollment.
        evidence_pattern: quantity_claim packet with device count + scope_inclusion packet naming Autopilot
        pitfalls: Do not include BYOD phones or tablets unless source packets explicitly add them.
      detailed_scope_of_services:
      - statement: Stage, image, enroll, asset tag, deploy, migrate OneDrive-backed profiles, and collect old laptops.
        evidence_pattern: scope_inclusion packet + customer_override packet naming OneDrive and collection path
        pitfalls: Do not add local data migration or app packaging unless cited.
      deliverables:
      - statement: Deployment tracker with user, serial, asset tag, site, wave, status, and legacy disposition path.
        evidence_pattern: deliverables packet naming tracker + quantity_claim packet with user/device rows
        pitfalls: Do not invent ServiceNow, CSV, or XLSX export requirements unless the source names them.
      assumptions:
      - statement: Customer-provided Autopilot profile and corporate image are approved before the first wave.
        evidence_pattern: scope_inclusion packet referencing Autopilot + action_item assigning image approval
        pitfalls: Use open_items if image ownership or approval date is missing.
      customer_responsibilities:
      - statement: Customer to provide device-to-user map, user schedule, app list, image access, and disposition rules.
        evidence_pattern: missing_info packet on user map + action_item packet assigning customer inputs
        pitfalls: Do not ask users for passwords; request approved admin or enrollment access.
      out_of_scope:
      - statement: Hardware procurement, custom app packaging, data recovery, and ongoing help desk support are excluded.
        evidence_pattern: scope_exclusion packet + scope_inclusion limited to refresh deployment
        pitfalls: Do not exclude data migration if migration_types are explicitly included elsewhere.
      risks_or_dependencies:
      - statement: Missing user schedule and app license confirmation may delay wave deployment and acceptance.
        evidence_pattern: missing_info packet on schedule + missing_info packet on app licensing
        pitfalls: Do not convert scheduling gaps into assumptions when users must be present.
      completion_criteria:
      - statement: Wave is complete when devices are enrolled, user-accepted, tracker-updated, and old assets collected.
        evidence_pattern: scope_inclusion packet + deliverables packet naming tracker and disposition update
        pitfalls: Do not require post-hypercare SLA performance unless support is in scope.
      open_items:
      - statement: Confirm whether local profile data outside OneDrive is migrated, skipped, or handled by user backup.
        evidence_pattern: missing_info packet on data migration boundary
        pitfalls: Do not assume cloud backup covers all user data.
    risk_patterns:
      - "User absent on wave day; device sits unenrolled and schedule slips."
      - "App licensing shortage for high-touch users."
      - "Data migration scope unclear — local profile data lost."
      - "Asset tracker out of sync after refresh; reconciliation costs labor."
      - "Approved hardware out of stock; substitute model unsupported by image."
    compliance_frameworks:
      - "Customer device disposal / DoD wipe / e-waste rules."
      - "License entitlement audit (M365, Adobe, etc.)."

  audio_visual:
    display_name: Audio Visual
    operating_rules:
      cite_sku: "Always cite manufacturer + model (Crestron / Biamp / QSC / Extron / Shure / Logitech / Poly) and connection type (HDMI, HDBaseT, SDI, Dante, AES67) when the source provides them."
      separate_av_from_cabling: "Audio-visual signal flow, control programming, and DSP gain structure are AV scope; cable pulls between AV endpoints belong under low_voltage_cabling unless explicitly bundled."
      acceptance: "Acceptance must reference a commissioning checklist (SPL targets, microphone gain, video latency, lipsync, network call quality)."
    normalization:
      vendors: [Crestron, Biamp, QSC, Extron, Shure, Sennheiser, Polycom, Poly, Logitech, "Microsoft Teams Room", Zoom]
      protocols: [Dante, AES67, AVB, NDI, HDBaseT, SDI, HDMI, USB-C]
    fields: {}
    artifact_labels: ["AV scope brief", "Conference room AV BOM"]
    subdomain_notes:
      - "Conference rooms, auditoriums, board rooms, signage walls."
      - "Always identify control system (Crestron / QSC Q-SYS / Extron) and DSP family."
      - "Network video conferencing (Teams / Zoom) is in scope when the room hardware is being installed."
    risk_patterns:
      - "Room cabling not in scope (HDMI/HDBaseT runs missing from low-voltage subcontract)."
      - "Codec firmware version mismatch between Teams Rooms / Zoom Rooms appliances."
      - "Dante / AES67 networking on a shared VLAN with QoS not configured."
      - "Signal-loss surprises on long HDBaseT pulls past 100m without extender plan."
      - "Acoustic treatment / SPL targets not measured at customer-acceptance."
    compliance_frameworks:
      - "Workplace ADA compliance for assistive listening / closed captioning."
    gold_examples:
      scope_overview:
      - statement: "Outfit 4 conference rooms with Logitech Rally Bar, 12 Samsung QM65R displays, and a QSC Q-SYS Core for Teams Rooms."
        evidence_pattern: "quantity_claim packet with room/display counts + scope_inclusion packet naming control/DSP platform"
        pitfalls: "Do not infer HDMI/HDBaseT cable pulls or electrical drops unless a separate low-voltage or electrical packet supports them."
      detailed_scope_of_services:
      - statement: "Mount displays and microphones, program the Q-SYS DSP gain structure, configure the Teams Room appliance, and commission lipsync and call quality."
        evidence_pattern: "scope_inclusion packet listing AV activities + compliance_clause naming a commissioning checklist (SPL/latency)"
        pitfalls: "Do not add Dante/AES67 VLAN/QoS network configuration unless a packet names the network design as provider scope."
      risks_or_dependencies:
      - statement: "Long HDBaseT pulls past 100m and an unconfirmed Dante VLAN with QoS may degrade signal and call audio at acceptance."
        evidence_pattern: "missing_info packet on cable run length or network design + scope_inclusion packet naming HDBaseT/Dante"
        pitfalls: "Do not present extender or QoS readiness as an assumption when it can change BOM, schedule, or acceptance."
      out_of_scope:
