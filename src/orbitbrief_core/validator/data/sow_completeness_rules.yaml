version: sow_completeness_rules_v1
description: Data-driven SOW completeness starter. Checks selected/inferred OrbitBrief domain packs against PM-critical
  SOW fields across all atoms, packets, and site clusters.
pack_aliases:
  telecom_structured_cabling:
  - telecom
  - low_voltage_cabling
  cabling:
  - low_voltage_cabling
  camera_vms_operations:
  - security_camera
  security_cameras:
  - security_camera
  bms:
  - building_management_systems
  bas:
  - building_management_systems
  procurement_finance:
  - commercial
  - hardware
  procurement:
  - commercial
  - hardware
  network_ops:
  - network_maintenance
  managed_services:
  - msp
  professional_services:
  - professional_services
  site:
  - site_structure
global_checks:
- id: global.customer_project_identity
  label: Customer / project identity
  severity: warning
  message: No clear customer or project identity was found in the substrate.
  suggested_open_question: Who is the contracting customer and what is the project / program name?
  evidence:
    any_regex:
    - \b(customer|client|owner|district|agency|university|hospital|city|county)\b
    - \b(project|program|scope|engagement)\b
- id: global.site_reality_present
  label: At least one physical site cluster
  severity: warning
  message: No publishable physical site cluster was found.
  suggested_open_question: Which physical site(s), buildings, rooms, MDFs/IDFs, or addresses are in scope?
  evidence:
    requires_site_cluster: true
- id: global.schedule_or_milestone
  label: Schedule / milestone / target date
  severity: warning
  message: No schedule, milestone, target go-live, or access-window timing evidence was found.
  suggested_open_question: What are the target dates, install windows, access windows, and acceptance milestones?
  evidence:
    any_regex:
    - \b(schedule|milestone|target go[- ]?live|go[- ]?live|completion|cutover|install window|access window|due date|weekend|after[-
      ]?hours)\b
    - \b20\d{2}[-/]\d{1,2}[-/]\d{1,2}\b
- id: global.commercial_structure
  label: Pricing / commercial structure
  severity: warning
  message: No pricing, rate card, quote, PO, NTE, fixed-fee, T&M, or unit-price structure was found.
  suggested_open_question: 'What is the commercial model: fixed fee, T&M, NTE, unit price, milestone billing, or
    quote/PO structure?'
  evidence:
    any_regex:
    - \b(price|pricing|quote|budget|cost|rate card|fixed fee|fixed[- ]price|t\s*&\s*m|time and materials|nte|not
      to exceed|unit price|purchase order|po\b|milestone billing)\b
    - \$\s?\d
- id: global.explicit_exclusions
  label: Explicit exclusions / boundaries
  severity: warning
  message: No explicit exclusions or by-others boundaries were found.
  suggested_open_question: What is explicitly excluded or by others?
  evidence:
    any_regex:
    - \b(excluded|exclusions?|out of scope|not included|by others|owner provided|customer provided|n\.i\.c\.|nic\b)\b
- id: global.explicit_assumptions
  label: Explicit assumptions
  severity: info
  message: No explicit assumptions were found.
  suggested_open_question: What assumptions is the SOW relying on?
  evidence:
    any_regex:
    - \b(assumption|assume|assumed|provided that|subject to|existing condition|existing pathway|power available|access
      available)\b
domains:
  low_voltage_cabling:
    display_name: Low Voltage Cabling
    inference_threshold: 4
    inference_min_hits: 6
    scope_triggers:
    - \b(cat\s?6a?|cat\s?5e|cabling|cable drops?|drops?|patch panel|keystone|faceplate|fluke|tia[- ]?568|tia[- ]?606|j[-
      ]?hooks?|fire[- ]?stop|idf|mdf)\b
    checks:
    - id: low_voltage_cabling.cable_category
      label: Cable category
      severity: blocker
      message: Cabling scope is present but no cable category was found.
      suggested_open_question: 'What cable category/type is required: Cat6, Cat6A, Cat5e, OM4, OS2, etc.?'
      evidence:
        any_regex:
        - \b(cat\s?5e|cat\s?6a?|category\s?6a?|category\s?6|fiber|om[1-5]|single[- ]?mode|multi[- ]?mode)\b
    - id: low_voltage_cabling.cable_family_jacket
      label: Cable family / jacket / environment
      severity: warning
      message: Cable category exists but no family/jacket/environment was found.
      suggested_open_question: Is the cable UTP/STP, plenum/riser/OSP, shielded, armored, or otherwise environment-specific?
      evidence:
        any_regex:
        - \b(utp|stp|shielded|plenum|cmp|riser|cmr|osp|indoor|outdoor|armored|low smoke|lszh)\b
    - id: low_voltage_cabling.drop_count
      label: Drop / run count
      severity: blocker
      message: Cabling scope is present but no drop/run/strand count was found.
      suggested_open_question: How many drops/runs/strands/pairs are in scope?
      evidence:
        any_regex:
        - \b\d{1,5}\s*(?:[A-Za-z0-9+/#.-]+\s+){0,6}(drops?|runs?|cables?|locations?|outlets?|strands?|pairs?)\b
    - id: low_voltage_cabling.termination_standard
      label: Termination standard
      severity: warning
      message: No copper termination standard was found.
      suggested_open_question: What termination standard and connector/jack class apply?
      evidence:
        any_regex:
        - \b(t568a|t568b|tia[- ]?568\.2[- ]?d|keystone|rj[- ]?45|110[- ]?block|bix|punch[- ]?down|termination)\b
    - id: low_voltage_cabling.pathway_requirements
      label: Pathway requirements
      severity: warning
      message: No pathway/conduit/J-hook/firestopping requirements were found.
      suggested_open_question: 'What pathway work is included: J-hooks, conduit, tray, sleeves, penetrations, fire-stopping?'
      evidence:
        any_regex:
        - \b(j[- ]?hooks?|conduit|sleeves?|tray|basket tray|ladder rack|pathway|penetration|fire[- ]?stop|core drill|surface
          raceway)\b
    - id: low_voltage_cabling.testing_standard
      label: Testing / certification standard
      severity: blocker
      message: No cabling test/certification standard was found.
      suggested_open_question: 'What test standard and report format are required: Fluke Versiv permanent-link,
        TIA-568.2-D, etc.?'
      evidence:
        any_regex:
        - \b(fluke|versiv|dsx|certif(?:y|ication)|permanent link|channel test|tia[- ]?568\.2[- ]?d|test reports?)\b
    - id: low_voltage_cabling.labeling_standard
      label: Labeling standard
      severity: warning
      message: No cable labeling standard or naming convention was found.
      suggested_open_question: 'What labeling convention applies: TIA-606-C, site/IDF/port/jack numbering?'
      evidence:
        any_regex:
        - \b(tia[- ]?606[- ]?c|label(?:ing|ling)?|label scheme|port number|site code|id f|idf|mdf|jack id|cable
          id)\b
    - id: low_voltage_cabling.patch_panels_rack_hw
      label: Patch panels / rack hardware
      severity: warning
      message: No patch panel or rack-mount hardware detail was found.
      suggested_open_question: Are patch panels, rack hardware, and cable management included? What qty/model/U?
      evidence:
        any_regex:
        - \b(patch panels?|rack[- ]?mount|horizontal manager|vertical manager|wire manager|1u|2u|110 block|termination
          block)\b
    - id: low_voltage_cabling.faceplates_jacks
      label: Faceplates / jacks / biscuits
      severity: warning
      message: No faceplate/jack/biscuit count or spec was found.
      suggested_open_question: Are faceplates, jacks, biscuits/surface boxes included? What counts/colors?
      evidence:
        any_regex:
        - \b(faceplates?|wall plates?|jacks?|keystones?|biscuits?|surface box|color)\b
    - id: low_voltage_cabling.demo_removal
      label: Demolition / abandoned cable removal
      severity: info
      message: No demolition/removal scope or explicit exclusion was found.
      suggested_open_question: Is demolition or abandoned cable removal included or excluded?
      evidence:
        any_regex:
        - \b(demo(?:lition)?|remove|removal|abandoned cable|decommission|pull out|dispose)\b
        - \b(no\s+demo|demolition excluded|removal excluded)\b
    - id: low_voltage_cabling.acceptance_package
      label: Acceptance package
      severity: warning
      message: No cabling acceptance deliverable package was found.
      suggested_open_question: 'What closeout artifacts are required: test reports, redlines, as-builts, photo logs?'
      evidence:
        any_regex:
        - \b(test reports?|as[- ]?built|redlines?|closeout|certification report|photo log|turnover package)\b
    # --- 2-case-review boss additions (cabling) ---
    - id: low_voltage_cabling.termination_scheme_missing
      label: Termination scheme (T568A vs T568B)
      severity: blocker
      message: Cabling scope does not specify T568A vs T568B termination scheme; both ends must follow one and only one.
      suggested_open_question: Will jacks be terminated to T568A or T568B, and is one scheme used uniformly site-wide?
      evidence:
        any_regex:
        - \b(t568a|t568b|568[- ]?a|568[- ]?b)\b
    - id: low_voltage_cabling.labeling_format_exact_missing
      label: Exact labeling format (TIA-606 site/IDF/port)
      severity: warning
      message: Labeling standard mentioned but the exact label syntax (e.g., SITE-IDF-PORT, building.floor.idf.jack) is not pinned.
      suggested_open_question: 'What is the exact label format and example: e.g., DURK-IDF301-A-12, with leading zeros and field separators?'
      evidence:
        any_regex:
        - \b[A-Z]{2,5}[- ./]?[A-Z0-9]{1,4}[- ./]?[A-Z0-9]{1,4}[- ./]?\d{1,4}\b
        - \blabel\s+example|\bsample\s+label|\blabel\s+format\b
    - id: low_voltage_cabling.faceplate_jack_color_missing
      label: Faceplate / jack color and count per location
      severity: warning
      message: Faceplate/jack model present but per-location color / count / icon scheme not specified.
      suggested_open_question: 'What faceplate/jack color, count per location, and port-icon scheme apply (e.g., blue=data, white=voice)?'
      evidence:
        any_regex:
        - \b(white|black|blue|red|green|ivory|gray|grey|almond|electric ivory)\b\s+(faceplate|jack|keystone)
        - \b\d{1,2}\s*[- ]?port\s+(faceplate|jack|biscuit)\b
    - id: low_voltage_cabling.service_loop_cable_management_missing
      label: Service loop length / cable management
      severity: warning
      message: No service loop length or vertical/horizontal cable management spec was found.
      suggested_open_question: 'What service loop length is required at jack and patch ends, and which vertical+horizontal managers will be used?'
      evidence:
        any_regex:
        - \bservice\s+loop\b|\bslack\s+loop\b|\bcoil\b
        - \b(vertical|horizontal)\s+(manager|wire\s+manager|cable\s+manager)\b
    - id: low_voltage_cabling.rough_in_trim_out_split_missing
      label: Rough-in vs trim-out scope split
      severity: warning
      message: Cabling scope does not split rough-in (cable pulls + sleeves) from trim-out (terminations + dressing + testing).
      suggested_open_question: How is the work split between rough-in (pulls, sleeves, fire-stop) and trim-out (terminate, dress, test, label) and who owns each phase?
      evidence:
        any_regex:
        - \brough[- ]?in\b
        - \btrim[- ]?out\b|\btrim\s+out\b
    # --- v8 boss additions (cabling) ---
    - id: low_voltage_cabling.grounding_bonding_backboard_missing
      label: Grounding / bonding / backboard responsibility
      severity: warning
      message: Cabling scope mentions ground bar / backboard / busbar as observation, but doesn't assign provision and acceptance responsibility.
      suggested_open_question: Who provides and installs the telecom backboard, ladder rack bonding, ground bar, and bonding conductor, and what TIA-607 acceptance evidence is required?
      evidence:
        any_regex:
        - \b(install|provide|provision|furnish)\b.{0,50}\b(grounding|bonding|busbar|backboard|ground\s+bar|tgb|tmgb|bonding\s+conductor|tia[- ]?607)\b
        - \b(grounding|bonding)\s+responsibility\b
        - \b(tia[- ]?607|telecommunications\s+bonding)\b
    - id: low_voltage_cabling.prevailing_wage_public_work_missing
      label: Prevailing wage / public-works labor terms
      severity: warning
      message: Public/K-12/municipal owner present but prevailing wage, certified payroll, union, background check, or public-works labor terms are not declared.
      suggested_open_question: Does the project require prevailing wage, certified payroll, union labor, background checks, or other public-works labor terms (state-specific)?
      evidence:
        any_regex:
        - \b(prevailing\s+wage|certified\s+payroll|union\s+labor|davis[- ]?bacon|public\s+works\s+labor|background\s+check|fingerprint|cori|live\s+scan)\b
    - id: low_voltage_cabling.attic_stock_warranty_registration_missing
      label: Attic stock + warranty registration in acceptance package
      severity: info
      message: Cabling acceptance package doesn't list attic stock counts or warranty registration with the cable/connectivity OEM.
      suggested_open_question: What attic stock (extra cables, jacks, faceplates) is required and is OEM warranty registration (Panduit, Belden, CommScope, Leviton, etc.) part of closeout?
      evidence:
        any_regex:
        - \b(attic\s+stock|spare\s+(?:cable|jack|faceplate|patch))\b
        - \b(warranty\s+registration|oem\s+warranty|extended\s+warranty\s+registration|panduit\s+pcc|commscope\s+systim?ax|belden\s+10gx)\b
    # --- v9 boss additions (cabling) ---
    - id: low_voltage_cabling.rack_strategy_anchoring_missing
      label: Rack strategy / anchoring / seismic
      severity: warning
      message: Rack or rack-elevation scope is present but rack type, anchoring, anti-tip / seismic, wall-mount, or rack-grounding requirements are not declared.
      suggested_open_question: 'What rack strategy applies: wall-mount, 2-post, 4-post, anchoring/anti-tip/seismic hardware, and rack grounding/bonding acceptance evidence?'
      evidence:
        any_regex:
        - \b(rack\s+elevation|wall\s+rack|new\s+wall\s+rack|ru\s*\d+|patch\s+panel|rack[- ]?mount|2[- ]?post|4[- ]?post|anti[- ]?tip|seismic\s+(rack|brace|anchor))\b
    - id: low_voltage_cabling.as_built_format_layer_convention_missing
      label: As-built format + layer convention
      severity: warning
      message: As-built / redline deliverables are present but file format, layer/naming convention, and revision ownership are not declared.
      suggested_open_question: 'What as-built format is required (DWG, PDF, Bluebeam, other), what layer/naming convention should be used, and who approves final redline conversion?'
      evidence:
        any_regex:
        - \b(as[- ]?built|asbuilt|redline|closeout\s+package|drawing\s+package|cad\s+(?:layer|convention|standard))\b
    - id: low_voltage_cabling.core_drilling_patch_paint_boundary_missing
      label: Core drilling / patching / paint boundary
      severity: warning
      message: Pathway or firestopping scope is present but core drilling, sleeves, patching, paint matching, ceiling repair, and restoration responsibilities are not assigned.
      suggested_open_question: If new sleeves/core drilling, patching, paint matching, ceiling repair, or wall restoration are required, who performs and pays for that work?
      evidence:
        any_regex:
        - \b(core\s+drill(?:ing)?|sleeve\s+install|patching|paint\s+match|ceiling\s+repair|wall\s+restoration|x[- ]?ray\s+scan)\b
  wireless:
    display_name: Wireless
    inference_threshold: 5
    inference_min_hits: 8
    # Boss-review v8 F6 — wireless inference must additionally see at
    # least one of the AP-/WLAN-specific anchor terms below or it
    # won't activate. Generic VLAN names + "aruba central" monitoring
    # mentions in MSP runbooks no longer pull wireless completeness in.
    required_anchor_min_distinct_hits: 2
    required_anchor_regex_any:
      # Requires AT LEAST 2 distinct AP/WLAN-specific tokens before
      # wireless completeness rules run. "AP" alone is too generic
      # (asset_type column, AP-on-a-stick, MAC etc.), so we require
      # multi-token AP/WLAN evidence. Removed bare ``\baps?\b``.
      - \b(access\s+points?|wlc|wireless\s+controller|wireless\s+lan\s+controller|wlan\s+controller)\b
      - \b(wi[- ]?fi\s+heatmap|wireless\s+heatmap|rf\s+heatmap)\b
      - \b802\.11(?:ac|ax|be|n|g)\b
      - \b(wlan\s+(?:install|deployment|design|cabling)|ap\s+install|ap\s+(?:cabling|drop)s?|access\s+point\s+(?:install|drop|cable)s?)\b
      - \b(ssid|wpa[23]|802\.1x\s+wireless|radius\s+wireless|wireless\s+psk)\b
      # AP-only model patterns (NOT switches like C9300):
      # Cisco AP series start with CW91xx, AIR-AP, AIR-CAP; Aruba AP-###;
      # Meraki MR##; Mist AP##; Ruckus R###.
      - \b(meraki\s+mr\d{2,3}|aruba\s+ap[- ]?\d{2,3}|cisco\s+(?:cw|air[- ]?(?:ap|cap))\d{2,4}|mist\s+ap\d|ruckus\s+r\d{3}|catalyst\s+9166|cw9166|cw9162|cw9164)\b
    scope_triggers:
    - \b(wireless|wlan|wi[- ]?fi|access points?|\baps?\b|heatmap|survey|wlc|ssid|radius|wpa3|6\s?ghz|spectrum)\b
    checks:
    - id: wireless.ap_count_model
      label: AP count and model
      severity: blocker
      message: Wireless scope is present but AP count/model evidence is incomplete.
      suggested_open_question: How many APs and what AP model(s) are in scope?
      evidence:
        any_regex:
        - \b\d{1,4}\s*(aps?|access points?)\b
        - \b(ap[- ]?\d+|cw\d+|mr\d+|cisco\s+\w+|meraki\s+mr|aruba\s+ap|mist\s+ap)\b
    - id: wireless.survey_type
      label: Survey type
      severity: warning
      message: No wireless survey type was found.
      suggested_open_question: Is this predictive, passive, AP-on-a-stick, active, or post-validation survey work?
      evidence:
        any_regex:
        - \b(predictive|passive|active survey|ap[- ]?on[- ]?a[- ]?stick|post[- ]?validation|walk test|rf survey)\b
    - id: wireless.heatmap_deliverables
      label: Heatmap / RF deliverables
      severity: warning
      message: No RF heatmap deliverables were found.
      suggested_open_question: 'What RF deliverables are required: heatmaps, SNR, channel reuse, coverage maps?'
      evidence:
        any_regex:
        - \b(heat ?map|signal strength|snr|channel reuse|coverage map|ekahau|airmagnet|hamina|sidekick)\b
    - id: wireless.ssid_vlan_auth
      label: SSID / VLAN / authentication config
      severity: warning
      message: No SSID/VLAN/authentication details were found.
      suggested_open_question: What SSIDs, VLANs, authentication, and guest access are in scope?
      evidence:
        any_regex:
        - \b(ssid|vlan|802\.1x|radius|psk|wpa2|wpa3|guest network|captive portal)\b
    - id: wireless.poe_switch_dependency
      label: PoE / switch dependency
      severity: warning
      message: No PoE budget or switch dependency was found.
      suggested_open_question: What PoE class/budget and switch/mGig dependencies exist?
      evidence:
        any_regex:
        - \b(poe\+?\+?|poe class|power budget|mgig|multi[- ]?gig|switch upgrade|uplink|injector)\b
    - id: wireless.mounting_access
      label: Mounting and access method
      severity: warning
      message: No AP mounting/access method was found.
      suggested_open_question: How will APs be mounted and what access/lift constraints apply?
      evidence:
        any_regex:
        - \b(t[- ]?bar|ceiling mount|wall mount|exterior mount|lift|ladder|mounting|bracket|j[- ]?hook)\b
    - id: wireless.acceptance_criteria
      label: Wireless acceptance criteria
      severity: warning
      message: No RF acceptance criteria were found.
      suggested_open_question: What RF performance targets define acceptance?
      evidence:
        any_regex:
        - \b(acceptance|pass/fail|throughput|rssi|snr|dbm|roaming|voice grade|validation criteria)\b
    # --- 2-case-review boss additions (wireless) ---
    - id: wireless.owner_furnished_boundary_missing
      label: Owner-furnished AP/cable boundary
      severity: warning
      message: Wireless scope present but the AP / cabling / mount boundary between owner-furnished and integrator-furnished is not declared.
      suggested_open_question: Are APs, mounts, and AP cabling owner-furnished or integrator-furnished, and where is the demarcation?
      evidence:
        any_regex:
        - \b(owner[- ]?furnished|customer[- ]?furnished|by\s+(owner|customer)|integrator[- ]?furnished)\b.{0,40}\b(ap|access\s+point|cable|mount)
    - id: wireless.ssid_vlan_auth_matrix_missing
      label: SSID / VLAN / auth matrix
      severity: blocker
      message: Wireless scope present but a SSID-to-VLAN-to-auth matrix is not declared. VLAN names alone do not satisfy this rule.
      suggested_open_question: 'What is the full SSID/VLAN/auth matrix: SSID name, VLAN, 802.1X vs PSK vs WPA2/3 vs Open, RADIUS server, guest captive portal?'
      evidence:
        # Boss-review v8 F9 — must explicitly find SSID + auth tokens
        # nearby. VLAN-only network maps no longer satisfy the rule.
        all_regex:
        - \b(ssid|wlan)\b
        - \b(802\.1x|radius|wpa3|wpa2|psk|captive\s+portal|open\s+authentication)\b
    - id: wireless.poe_class_per_ap_missing
      label: PoE class per AP (802.3af / at / bt)
      severity: blocker
      message: Wireless scope present but PoE class per AP (802.3af / at / bt or PoE+ / UPoE / Class 4-8) and per-switch power budget are not declared. A generic "PoE Watts" column does not satisfy this rule.
      suggested_open_question: 'What PoE class do the APs require (802.3af vs at vs bt, or Class 4 vs 6 vs 8) and is the source switch power budget reserved?'
      evidence:
        # Boss-review v8 F10 — strict on class identifier, not just
        # generic "PoE Watts" columns from spreadsheets.
        any_regex:
        - \b802\.3(?:af|at|bt)\b
        - \b(poe\+\+|upoe(\+|plus)?|poe\s+class\s+[1-8]|class\s+[1-8]\s+poe)\b
    - id: wireless.mounting_locations_missing
      label: Per-AP mounting locations
      severity: warning
      message: Wireless scope present but per-AP mounting locations / heights / orientations are not enumerated.
      suggested_open_question: 'What are the per-AP mounting locations, heights, orientations, and antenna types?'
      evidence:
        any_regex:
        - \bap[- ]?\d+\b.{0,60}\b(ceiling|wall|t[- ]?bar|mount|height|column|hallway|room\s+\d+)\b
    - id: wireless.post_validation_walkthrough_missing
      label: Post-deployment validation walk-through
      severity: warning
      message: Wireless scope present but a post-deployment RF / coverage walk-through (sometimes called "as-built survey" or "post-validation") is not specified.
      suggested_open_question: Is a post-deployment validation walk-through (heatmap, RSSI, SNR, channel/CCI, roaming, voice grade) required, with what pass/fail thresholds?
      evidence:
        any_regex:
        - \bpost[- ]?(?:validation|deployment|install)\s+(survey|walk[- ]?through|heatmap|test)\b
        - \bas[- ]?built\s+(?:rf\s+|wireless\s+)?(survey|heatmap)\b
    # --- v9 boss additions (wireless) ---
    - id: wireless.per_ap_cable_certification_level_missing
      label: Per-AP cable certification level
      severity: blocker
      message: AP cabling scope present but per-AP cable category / shielding / mGig + 6 GHz readiness / 4-pair certification requirement are not declared.
      suggested_open_question: 'What cable category and certification level are required per AP drop: Cat6 vs Cat6A, shielded vs UTP, 4-pair permanent-link, mGig/6 GHz ready, OEM-specific requirement?'
      evidence:
        any_regex:
        - \b(per[- ]?ap\s+(?:cable|cert)|ap\s+cable\s+(?:category|class|cert|certification)|cat6a?\s+(?:per|each)\s+ap|4[- ]?pair\s+(?:permanent|certification))\b
    - id: wireless.dfs_channel_policy_missing
      label: DFS channel policy
      severity: warning
      message: Wireless scope present but DFS channel usage / avoidance / event handling are not declared.
      suggested_open_question: Are DFS channels allowed, avoided, or conditionally used, and what happens when DFS events force channel changes?
      evidence:
        any_regex:
        - \bdfs(?:\s+channel)?(?:\s+(?:policy|allowed|avoided|usage|event))?\b
    - id: wireless.wips_rogue_ap_policy_missing
      label: WIPS / rogue-AP policy
      severity: warning
      message: Wireless scope present but WIPS / rogue-AP detection, alert routing, and remediation ownership are not declared.
      suggested_open_question: Should WIPS/rogue-AP events be monitored, who receives alerts, and who owns containment / remediation?
      evidence:
        any_regex:
        - \b(wips|rogue\s+ap|wireless\s+ips|wireless\s+intrusion|airwave\s+wips)\b
