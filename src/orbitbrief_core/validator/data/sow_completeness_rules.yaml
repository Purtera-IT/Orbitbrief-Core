  site_structure:
    display_name: Site Structure
    inference_threshold: 4
    inference_min_hits: 6
    scope_triggers:
    - \b(site list|site roster|building|floor|room|mdf|idf|address|access constraint|wan provider|critical systems)\b
    checks:
    # --- 2-case-review boss addition: site_roster row MUST publish ---
    - id: site_structure.site_roster_must_publish
      label: site_roster atom must produce publishable site cluster
      severity: blocker
      message: A site_roster atom exists but no publishable physical-site cluster was produced from it.
      suggested_open_question: 'Why did the customer-supplied site roster row not publish as a physical-site cluster? (Verify Site Reality v5 site_roster promotion path.)'
      evidence:
        requires_atom_type: [site_roster]
        requires_site_cluster: true
    # Boss-review v8 F1 — every published site cluster must
    # explicitly carry kind=physical_site and cite member atoms.
    # The validator can't inspect cluster fields directly today, so
    # this is documented as a meta-rule whose machine equivalent
    # lives in the regression contract; we still emit it so the
    # boss bundle clearly shows the gate exists.
    - id: site_structure.cluster_kind_and_evidence_required
      label: Site cluster kind + evidence provenance
      severity: warning
      message: Every published site cluster must declare kind=physical_site and cite the source atoms / artifacts that prove the site identity (address, MDF, IDFs, providers, access).
      suggested_open_question: 'Verify each published site cluster carries kind=physical_site and that member_atom_ids / artifact_ids are populated; if not, the synthesis rendering or model is broken.'
      evidence:
        requires_atom_type: [site_roster]
        requires_site_cluster: true
    # --- v9 boss additions (site structure) ---
    - id: site_structure.after_hours_escort_billing_missing
      label: After-hours escort / site-staff billing
      severity: warning
      message: Escort / badge / restricted-hours / after-hours work present but billing & ownership for escorts, custodial coverage, and site supervision are not declared.
      suggested_open_question: Who provides and pays for after-hours / weekend escorts, custodial coverage, lift access, and building supervision during restricted work windows?
      evidence:
        any_regex:
        - \b(escort\s+(?:billing|cost|hourly|fee)|custodial\s+(?:coverage|fee|after[- ]?hours)|after[- ]?hours\s+(?:escort|supervision)|weekend\s+escort|noisy\s+work\s+after)\b
    - id: site_structure.after_hours_hvac_reservation_missing
      label: After-hours HVAC / building-system reservation
      severity: info
      message: After-hours site work present but HVAC / lighting / building-system reservation is not declared.
      suggested_open_question: Is after-hours HVAC, lighting, elevator, and building-system access required, who reserves it, and who confirms the building is usable during the work window?
      evidence:
        any_regex:
        - \b(after[- ]?hours\s+(?:hvac|lighting|building|access)|hvac\s+reservation|building\s+system\s+reservation|elevator\s+(?:reservation|access\s+window))\b
    - id: site_structure.elevator_dock_key_badge_missing
      label: Elevator / dock / key / badge logistics
      severity: info
      message: Municipal / school / public-counter site work present but elevator, dock/loading, key, and badge issuance logistics are not declared.
      suggested_open_question: Who issues elevator keys, loading-dock access, room keys, badges, and security/lobby approvals for materials and crews?
      evidence:
        any_regex:
        - \b(loading\s+dock|dock\s+access|elevator\s+(?:key|access|reserv|use)|materials\s+staged|staging\s+area|lobby\s+approval|materials\s+lobby)\b
    - id: site_structure.site_roster
      label: Site roster with physical site evidence
      severity: blocker
      message: Site-structure scope is present but no publishable site cluster exists.
      suggested_open_question: Which physical sites/buildings/rooms are in scope?
      evidence:
        requires_site_cluster: true
    - id: site_structure.address_access
      label: Addresses / access constraints
      severity: warning
      message: No address/access-constraint evidence was found.
      suggested_open_question: What addresses and access constraints apply to each site?
      evidence:
        any_regex:
        - \b(address|street|ave|road|rd\b|st\b|access|escort|badge|credential|after[- ]?hours|24x7)\b
    - id: site_structure.mdf_idf_wan
      label: MDF/IDF/WAN critical systems
      severity: warning
      message: No MDF/IDF/WAN/critical-system evidence was found.
      suggested_open_question: Which MDF/IDF/demarc/WAN providers and critical systems map to each site?
      evidence:
        any_regex:
        - \b(mdf|idf|wan|carrier|provider|critical systems|demarc)\b
