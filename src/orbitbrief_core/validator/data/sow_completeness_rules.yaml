version: sow_completeness_rules_v1
description: Data-driven SOW completeness starter. Checks selected/inferred OrbitBrief domain packs against PM-critical
  SOW fields across all atoms, packets, and site clusters.
pack_aliases:
  telecom_structured_cabling:
  - telecom
  - low_voltage_cabling
  cabling:
  - low_voltage_cabling
  camera_vms_operations:
  - security_camera
  security_cameras:
  - security_camera
  bms:
  - building_management_systems
  bas:
  - building_management_systems
  procurement_finance:
  - commercial
  - hardware
  procurement:
  - commercial
  - hardware
  network_ops:
  - network_maintenance
  managed_services:
  - msp
  professional_services:
  - professional_services
  site:
  - site_structure
global_checks:
- id: global.customer_project_identity
  label: Customer / project identity
  severity: warning
  message: No clear customer or project identity was found in the substrate.
  suggested_open_question: Who is the contracting customer and what is the project / program name?
  evidence:
    any_regex:
    - \b(customer|client|owner|district|agency|university|hospital|city|county)\b
    - \b(project|program|scope|engagement)\b
- id: global.site_reality_present
  label: At least one physical site cluster
  severity: warning
  message: No publishable physical site cluster was found.
  suggested_open_question: Which physical site(s), buildings, rooms, MDFs/IDFs, or addresses are in scope?
  evidence:
    requires_site_cluster: true
- id: global.schedule_or_milestone
  label: Schedule / milestone / target date
  severity: warning
  message: No schedule, milestone, target go-live, or access-window timing evidence was found.
  suggested_open_question: What are the target dates, install windows, access windows, and acceptance milestones?
  evidence:
    any_regex:
    - \b(schedule|milestone|target go[- ]?live|go[- ]?live|completion|cutover|install window|access window|due date|weekend|after[-
      ]?hours)\b
    - \b20\d{2}[-/]\d{1,2}[-/]\d{1,2}\b
- id: global.commercial_structure
  label: Pricing / commercial structure
  severity: warning
  message: No pricing, rate card, quote, PO, NTE, fixed-fee, T&M, or unit-price structure was found.
  suggested_open_question: 'What is the commercial model: fixed fee, T&M, NTE, unit price, milestone billing, or
    quote/PO structure?'
  evidence:
    any_regex:
    - \b(price|pricing|quote|budget|cost|rate card|fixed fee|fixed[- ]price|t\s*&\s*m|time and materials|nte|not
      to exceed|unit price|purchase order|po\b|milestone billing)\b
    - \$\s?\d
- id: global.explicit_exclusions
  label: Explicit exclusions / boundaries
  severity: warning
  message: No explicit exclusions or by-others boundaries were found.
  suggested_open_question: What is explicitly excluded or by others?
  evidence:
    any_regex:
    - \b(excluded|exclusions?|out of scope|not included|by others|owner provided|customer provided|n\.i\.c\.|nic\b)\b
- id: global.explicit_assumptions
  label: Explicit assumptions
  severity: info
  message: No explicit assumptions were found.
  suggested_open_question: What assumptions is the SOW relying on?
  evidence:
    any_regex:
    - \b(assumption|assume|assumed|provided that|subject to|existing condition|existing pathway|power available|access
      available)\b
domains:
  low_voltage_cabling:
    display_name: Low Voltage Cabling
    scope_triggers:
    - \b(cat\s?6a?|cat\s?5e|cabling|cable drops?|drops?|patch panel|keystone|faceplate|fluke|tia[- ]?568|tia[- ]?606|j[-
      ]?hooks?|fire[- ]?stop|idf|mdf)\b
    checks:
    - id: low_voltage_cabling.cable_category
      label: Cable category
      severity: blocker
      message: Cabling scope is present but no cable category was found.
      suggested_open_question: 'What cable category/type is required: Cat6, Cat6A, Cat5e, OM4, OS2, etc.?'
      evidence:
        any_regex:
        - \b(cat\s?5e|cat\s?6a?|category\s?6a?|category\s?6|fiber|om[1-5]|single[- ]?mode|multi[- ]?mode)\b
    - id: low_voltage_cabling.cable_family_jacket
      label: Cable family / jacket / environment
      severity: warning
      message: Cable category exists but no family/jacket/environment was found.
      suggested_open_question: Is the cable UTP/STP, plenum/riser/OSP, shielded, armored, or otherwise environment-specific?
      evidence:
        any_regex:
        - \b(utp|stp|shielded|plenum|cmp|riser|cmr|osp|indoor|outdoor|armored|low smoke|lszh)\b
    - id: low_voltage_cabling.drop_count
      label: Drop / run count
      severity: blocker
      message: Cabling scope is present but no drop/run/strand count was found.
      suggested_open_question: How many drops/runs/strands/pairs are in scope?
      evidence:
        any_regex:
        - \b\d{1,5}\s*(?:[A-Za-z0-9+/#.-]+\s+){0,6}(drops?|runs?|cables?|locations?|outlets?|strands?|pairs?)\b
    - id: low_voltage_cabling.termination_standard
      label: Termination standard
      severity: warning
      message: No copper termination standard was found.
      suggested_open_question: What termination standard and connector/jack class apply?
      evidence:
        any_regex:
        - \b(t568a|t568b|tia[- ]?568\.2[- ]?d|keystone|rj[- ]?45|110[- ]?block|bix|punch[- ]?down|termination)\b
    - id: low_voltage_cabling.pathway_requirements
      label: Pathway requirements
      severity: warning
      message: No pathway/conduit/J-hook/firestopping requirements were found.
      suggested_open_question: 'What pathway work is included: J-hooks, conduit, tray, sleeves, penetrations, fire-stopping?'
      evidence:
        any_regex:
        - \b(j[- ]?hooks?|conduit|sleeves?|tray|basket tray|ladder rack|pathway|penetration|fire[- ]?stop|core drill|surface
          raceway)\b
    - id: low_voltage_cabling.testing_standard
      label: Testing / certification standard
      severity: blocker
      message: No cabling test/certification standard was found.
      suggested_open_question: 'What test standard and report format are required: Fluke Versiv permanent-link,
        TIA-568.2-D, etc.?'
      evidence:
        any_regex:
        - \b(fluke|versiv|dsx|certif(?:y|ication)|permanent link|channel test|tia[- ]?568\.2[- ]?d|test reports?)\b
    - id: low_voltage_cabling.labeling_standard
      label: Labeling standard
      severity: warning
      message: No cable labeling standard or naming convention was found.
      suggested_open_question: 'What labeling convention applies: TIA-606-C, site/IDF/port/jack numbering?'
      evidence:
        any_regex:
        - \b(tia[- ]?606[- ]?c|label(?:ing|ling)?|label scheme|port number|site code|id f|idf|mdf|jack id|cable
          id)\b
    - id: low_voltage_cabling.patch_panels_rack_hw
      label: Patch panels / rack hardware
      severity: warning
      message: No patch panel or rack-mount hardware detail was found.
      suggested_open_question: Are patch panels, rack hardware, and cable management included? What qty/model/U?
      evidence:
        any_regex:
        - \b(patch panels?|rack[- ]?mount|horizontal manager|vertical manager|wire manager|1u|2u|110 block|termination
          block)\b
    - id: low_voltage_cabling.faceplates_jacks
      label: Faceplates / jacks / biscuits
      severity: warning
      message: No faceplate/jack/biscuit count or spec was found.
      suggested_open_question: Are faceplates, jacks, biscuits/surface boxes included? What counts/colors?
      evidence:
        any_regex:
        - \b(faceplates?|wall plates?|jacks?|keystones?|biscuits?|surface box|color)\b
    - id: low_voltage_cabling.demo_removal
      label: Demolition / abandoned cable removal
      severity: info
      message: No demolition/removal scope or explicit exclusion was found.
      suggested_open_question: Is demolition or abandoned cable removal included or excluded?
      evidence:
        any_regex:
        - \b(demo(?:lition)?|remove|removal|abandoned cable|decommission|pull out|dispose)\b
        - \b(no\s+demo|demolition excluded|removal excluded)\b
    - id: low_voltage_cabling.acceptance_package
      label: Acceptance package
      severity: warning
      message: No cabling acceptance deliverable package was found.
      suggested_open_question: 'What closeout artifacts are required: test reports, redlines, as-builts, photo logs?'
      evidence:
        any_regex:
        - \b(test reports?|as[- ]?built|redlines?|closeout|certification report|photo log|turnover package)\b
  wireless:
    display_name: Wireless
    scope_triggers:
    - \b(wireless|wlan|wi[- ]?fi|access points?|\baps?\b|heatmap|survey|wlc|ssid|radius|wpa3|6\s?ghz|spectrum)\b
    checks:
    - id: wireless.ap_count_model
      label: AP count and model
      severity: blocker
      message: Wireless scope is present but AP count/model evidence is incomplete.
      suggested_open_question: How many APs and what AP model(s) are in scope?
      evidence:
        any_regex:
        - \b\d{1,4}\s*(aps?|access points?)\b
        - \b(ap[- ]?\d+|cw\d+|mr\d+|cisco\s+\w+|meraki\s+mr|aruba\s+ap|mist\s+ap)\b
    - id: wireless.survey_type
      label: Survey type
      severity: warning
      message: No wireless survey type was found.
      suggested_open_question: Is this predictive, passive, AP-on-a-stick, active, or post-validation survey work?
      evidence:
        any_regex:
        - \b(predictive|passive|active survey|ap[- ]?on[- ]?a[- ]?stick|post[- ]?validation|walk test|rf survey)\b
    - id: wireless.heatmap_deliverables
      label: Heatmap / RF deliverables
      severity: warning
      message: No RF heatmap deliverables were found.
      suggested_open_question: 'What RF deliverables are required: heatmaps, SNR, channel reuse, coverage maps?'
      evidence:
        any_regex:
        - \b(heat ?map|signal strength|snr|channel reuse|coverage map|ekahau|airmagnet|hamina|sidekick)\b
    - id: wireless.ssid_vlan_auth
      label: SSID / VLAN / authentication config
      severity: warning
      message: No SSID/VLAN/authentication details were found.
      suggested_open_question: What SSIDs, VLANs, authentication, and guest access are in scope?
      evidence:
        any_regex:
        - \b(ssid|vlan|802\.1x|radius|psk|wpa2|wpa3|guest network|captive portal)\b
    - id: wireless.poe_switch_dependency
      label: PoE / switch dependency
      severity: warning
      message: No PoE budget or switch dependency was found.
      suggested_open_question: What PoE class/budget and switch/mGig dependencies exist?
      evidence:
        any_regex:
        - \b(poe\+?\+?|poe class|power budget|mgig|multi[- ]?gig|switch upgrade|uplink|injector)\b
    - id: wireless.mounting_access
      label: Mounting and access method
      severity: warning
      message: No AP mounting/access method was found.
      suggested_open_question: How will APs be mounted and what access/lift constraints apply?
      evidence:
        any_regex:
        - \b(t[- ]?bar|ceiling mount|wall mount|exterior mount|lift|ladder|mounting|bracket|j[- ]?hook)\b
    - id: wireless.acceptance_criteria
      label: Wireless acceptance criteria
      severity: warning
      message: No RF acceptance criteria were found.
      suggested_open_question: What RF performance targets define acceptance?
      evidence:
        any_regex:
        - \b(acceptance|pass/fail|throughput|rssi|snr|dbm|roaming|voice grade|validation criteria)\b
  security_access:
    display_name: Security Access Control
    scope_triggers:
    - \b(access control|card reader|badge reader|door controller|hid|mercury|lenel|synergis|rex|dps|maglock|electric
      strike)\b
    checks:
    - id: security_access.door_count_type
      label: Door count / door type
      severity: blocker
      message: Access-control scope is present but no door count/type was found.
      suggested_open_question: How many doors/openings/readers and what door types are in scope?
      evidence:
        any_regex:
        - \b\d{1,4}\s*(doors?|openings?|readers?)\b
        - \b(single door|double door|mantrap|storefront|gate)\b
    - id: security_access.reader_model
      label: Reader model / manufacturer
      severity: warning
      message: No reader model/manufacturer was found.
      suggested_open_question: What reader model and credential standard are required?
      evidence:
        any_regex:
        - \b(hid|signo|iclass|seos|mifare|desfire|reader model|card reader|badge reader)\b
    - id: security_access.lock_hardware
      label: Locking hardware
      severity: warning
      message: No lock hardware scope was found.
      suggested_open_question: 'What lock hardware is included/excluded: electric strike, maglock, electrified mortise?'
      evidence:
        any_regex:
        - \b(electric strike|maglock|magnetic lock|electrified mortise|panic hardware|lockset|door hardware)\b
    - id: security_access.rex_dps
      label: REX / DPS / door monitoring
      severity: warning
      message: No REX/DPS/fault-monitoring detail was found.
      suggested_open_question: Are REX, DPS, bond sensors, and fault monitoring included?
      evidence:
        any_regex:
        - \b(rex|request[- ]?to[- ]?exit|dps|door position|bond sensor|motion rex|fault monitoring)\b
    - id: security_access.controller_power
      label: Controller / panel / power
      severity: warning
      message: No controller/panel/power detail was found.
      suggested_open_question: What controller/panel/power supply/battery backup is required?
      evidence:
        any_regex:
        - \b(mercury|lp\d+|controller|panel|power supply|battery backup|slsa|ups|enclosure)\b
    - id: security_access.platform_integration
      label: Access platform / integration
      severity: warning
      message: No access-control software platform was found.
      suggested_open_question: What software platform and cardholder/visitor integrations are in scope?
      evidence:
        any_regex:
        - \b(onguard|synergis|amag|kantech|avigilon alta|access platform|cardholder|visitor management)\b
    - id: security_access.acceptance
      label: Door acceptance test
      severity: warning
      message: No access-control acceptance test was found.
      suggested_open_question: What door-cycle, badge, audit-log, and access-level tests define acceptance?
      evidence:
        any_regex:
        - \b(door cycle test|audit log|badge test|access level test|acceptance|commissioning)\b
  security_camera:
    display_name: Security Camera / VMS
    scope_triggers: &id001
    - \b(camera|vms|video management|genetec|axis|hanwha|milestone|avigilon|nvr|ptz|video retention)\b
    checks: &id002
    - id: security_camera.camera_count_model
      label: Camera count and model
      severity: blocker
      message: Camera/VMS scope is present but no camera count/model was found.
      suggested_open_question: How many cameras and what model(s) are in scope?
      evidence:
        any_regex:
        - \b\d{1,5}\s*(cameras?|ptz|domes?|multi[- ]?sensor)\b
        - \b(axis|hanwha|avigilon|hikvision|bosch|verkada|p\d{4}|qnv|qnp|wv[- ]?s)\b
    - id: security_camera.camera_type_mount
      label: Camera type / mount
      severity: warning
      message: No camera type or mount detail was found.
      suggested_open_question: What camera types and mounts are required?
      evidence:
        any_regex:
        - \b(fixed dome|ptz|multi[- ]?sensor|panoramic|thermal|bullet|pendant|wall mount|pole mount|corner mount|in[-
          ]?ceiling)\b
    - id: security_camera.resolution_bitrate_codec
      label: Resolution / bitrate / codec
      severity: warning
      message: No video resolution, bitrate, frame rate, or codec assumptions were found.
      suggested_open_question: What resolution, FPS, bitrate, and codec assumptions drive storage and bandwidth?
      evidence:
        any_regex:
        - \b(\d+\s?mp|1080p|4k|fps|frame rate|bitrate|h\.264|h\.265|codec|resolution)\b
    - id: security_camera.vms_platform
      label: VMS platform
      severity: blocker
      message: No VMS platform was found.
      suggested_open_question: What VMS platform is in scope?
      evidence:
        any_regex:
        - \b(genetec security center|milestone xprotect|avigilon|verkada|vms|video management system|security center|xprotect)\b
    - id: security_camera.video_retention
      label: Video retention SLA
      severity: blocker
      message: Camera/VMS scope is present but no explicit video footage retention SLA was found.
      suggested_open_question: What is the required video footage retention period in days?
      evidence:
        any_regex:
        - \b(video|footage|recording|recorded video|surveillance)\b.{0,80}\b(retention|retain|days|storage)\b
        - \b(retention|retain|days|storage)\b.{0,80}\b(video|footage|recording|recorded video|surveillance)\b
    - id: security_camera.storage_nvr
      label: Storage / NVR / server model
      severity: warning
      message: No storage/NVR/server architecture was found.
      suggested_open_question: What storage/NVR/server/RAID architecture supports video retention?
      evidence:
        any_regex:
        - \b(nvr|storage server|streamvault|raid|video archive|retention server|nas|san)\b
    - id: security_camera.recording_config
      label: Recording mode
      severity: warning
      message: No recording mode was found.
      suggested_open_question: Is recording continuous, motion, event-based, or hybrid?
      evidence:
        any_regex:
        - \b(continuous recording|motion recording|event[- ]?based recording|hybrid recording|recording mode|recording
          schedule)\b
    - id: security_camera.network_vlan_ports
      label: Network port / VLAN per camera
      severity: warning
      message: No camera network/VLAN/port mapping was found.
      suggested_open_question: What switch ports, VLANs, and PoE budgets apply per camera?
      evidence:
        any_regex:
        - \b(camera vlan|vlan|switch port|port map|network port|poe class|poe budget)\b
    - id: security_camera.privacy_compliance
      label: Privacy / compliance / masking
      severity: warning
      message: No privacy/compliance/masking requirement was found.
      suggested_open_question: Are privacy masks, compliance rules, or approval workflows required?
      evidence:
        any_regex:
        - \b(privacy mask|privacy zone|hipaa|pci|criminal justice|cjIS|retention audit|masking approval)\b
    - id: security_camera.acceptance
      label: Camera/VMS acceptance criteria
      severity: warning
      message: No camera/VMS acceptance criteria were found.
      suggested_open_question: 'What defines acceptance: FoV review, stream health, retention audit, naming, uptime
        SLA?'
      evidence:
        any_regex:
        - \b(fov|field of view|retention audit|uptime sla|camera naming|stream health|view review|commissioning|acceptance)\b
  camera_vms_operations:
    display_name: Camera VMS Operations
    scope_triggers: *id001
    checks: *id002
  paging_mass_notification:
    display_name: Paging / Mass Notification
    scope_triggers:
    - \b(paging|intercom|public address|pa system|mass notification|bell schedule|speaker|strobe|informacast|alertus|rave|singlewire|valcom|bogen)\b
    checks:
    - id: paging.speaker_count_model
      label: Speaker count / model
      severity: blocker
      message: Paging scope is present but no speaker count/model was found.
      suggested_open_question: How many speakers/strobes and what models are in scope?
      evidence:
        any_regex:
        - \b\d{1,5}\s*(speakers?|horns?|strobes?)\b
        - \b(bogen|valcom|atlas|jbl|speaker model|horn speaker|ceiling speaker)\b
    - id: paging.amplifier_wattage
      label: Amplifier / wattage budget
      severity: warning
      message: No amplifier/wattage budget was found.
      suggested_open_question: What amplifier model/count and wattage budget are required?
      evidence:
        any_regex:
        - \b(amplifier|amp\b|wattage|watts|w budget|70v|25v)\b
    - id: paging.zones_bell_schedule
      label: Zones / bell schedule
      severity: warning
      message: No paging zone or bell schedule was found.
      suggested_open_question: What zones and bell schedules/overrides are required?
      evidence:
        any_regex:
        - \b(zone|zoning|bell schedule|schedule override|bell controller)\b
    - id: paging.platform_triggers
      label: Platform / trigger sources
      severity: warning
      message: No notification platform or trigger source was found.
      suggested_open_question: What mass-notification platform and trigger sources are in scope?
      evidence:
        any_regex:
        - \b(informacast|alertus|rave|singlewire|athoc|panic button|intercom|police dispatch|trigger source)\b
    - id: paging.acceptance
      label: Paging acceptance criteria
      severity: warning
      message: No SPL/intelligibility/drill acceptance criteria were found.
      suggested_open_question: What SPL/intelligibility/drill tests define acceptance?
      evidence:
        any_regex:
        - \b(spl|intelligibility|sti|drill test|acceptance|sound level|db)\b
  fire_safety:
    display_name: Fire Safety
    scope_triggers:
    - \b(fire alarm|facp|nfpa\s?72|smoke detector|heat detector|pull station|horn strobe|annunciator|nac|ahj)\b
    checks:
    - id: fire_safety.facp_model
      label: FACP model / manufacturer
      severity: blocker
      message: Fire-safety scope is present but no FACP model/manufacturer was found.
      suggested_open_question: What FACP model/manufacturer is in scope?
      evidence:
        any_regex:
        - \b(facp|fire alarm control panel|notifier|simplex|edwards|firelite|silent knight)\b
    - id: fire_safety.code_ahj
      label: Code / AHJ reference
      severity: blocker
      message: No NFPA/AHJ/code basis was found.
      suggested_open_question: Which NFPA 72 edition and AHJ acceptance path apply?
      evidence:
        any_regex:
        - \b(nfpa\s?72|ahj|authority having jurisdiction|fire marshal|code edition)\b
    - id: fire_safety.devices_counts
      label: Device counts
      severity: warning
      message: No smoke/heat/pull/horn/strobe device counts were found.
      suggested_open_question: What device counts/models are included?
      evidence:
        any_regex:
        - \b\d{1,5}\s*(smoke detectors?|heat detectors?|pull stations?|horns?|strobes?|nacs?)\b
    - id: fire_safety.acceptance_test
      label: AHJ inspection / acceptance test
      severity: warning
      message: No AHJ inspection or acceptance test plan was found.
      suggested_open_question: What inspection/pre-test/AHJ witness plan defines acceptance?
      evidence:
        any_regex:
        - \b(acceptance test|inspection|fire marshal|ahj witness|pre-test|sequence test)\b
    - id: fire_safety.exclusions
      label: Fire-safety exclusions
      severity: warning
      message: No fire-safety exclusions were found.
      suggested_open_question: 'What fire-safety scope is excluded: sprinkler, electrical, AHJ fees, permits?'
      evidence:
        any_regex:
        - \b(sprinkler excluded|electrical excluded|ahj fees excluded|permit excluded|not included|out of scope)\b
  das:
    display_name: Distributed Antenna System
    scope_triggers:
    - \b(das|distributed antenna|errcs|bda|public safety radio|donor antenna|signal booster|p25|ber|uplink)\b
    checks:
    - id: das.coverage_type
      label: Coverage type
      severity: blocker
      message: DAS scope is present but coverage type was not found.
      suggested_open_question: Is the DAS public-safety, cellular, or both? Which carriers/bands?
      evidence:
        any_regex:
        - \b(public safety|cellular|carrier|firstnet|p25|lte|5g|errcs)\b
    - id: das.headend_model
      label: BDA/DAS head-end model
      severity: warning
      message: No BDA/DAS head-end model was found.
      suggested_open_question: What BDA/DAS head-end manufacturer/model is required?
      evidence:
        any_regex:
        - \b(bda|head[- ]?end|signal booster|commscope|solid|adrf|westell|rf headend)\b
    - id: das.antenna_count_type
      label: Antenna count / type
      severity: warning
      message: No antenna count/type was found.
      suggested_open_question: How many antennas and what type/location?
      evidence:
        any_regex:
        - \b\d{1,4}\s*(antennas?)\b
        - \b(omni|directional|panel antenna|donor antenna)\b
    - id: das.ahj_rf_acceptance
      label: RF/AHJ acceptance test
      severity: blocker
      message: No DAS RF/AHJ acceptance test was found.
      suggested_open_question: What RF grid/signal/BER/AHJ acceptance criteria apply?
      evidence:
        any_regex:
        - \b(signal strength|ber|da q|grid test|walk test|ahj|acceptance|errcs standard)\b
  electrical:
    display_name: Electrical / Power
    scope_triggers:
    - \b(panelboard|breaker|circuit|conduit|raceway|receptacle|ups|generator|ats|grounding|bonding|nema|load test)\b
    checks:
    - id: electrical.panel_breaker
      label: Panelboard / breaker schedule
      severity: blocker
      message: Electrical scope is present but panel/breaker schedule evidence is missing.
      suggested_open_question: What panelboards, breakers, amperage/voltage, and circuit numbers are in scope?
