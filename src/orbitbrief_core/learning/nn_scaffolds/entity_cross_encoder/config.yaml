# Entity cross-encoder config — SCAFFOLDED, NOT IN PRODUCTION.

base_model: cross-encoder/ms-marco-MiniLM-L-6-v2

# Training
training:
  epochs: 3
  learning_rate: 2.0e-5
  batch_size: 32
  warmup_ratio: 0.1
  max_seq_length: 128

# Activation gates
gates:
  min_training_pairs: 2000
  min_test_f1: 0.85
  min_uplift_pp: 5

# Inference
inference:
  endpoint: ""                                    # e.g. http://entity-encoder:8080/score
  top_k_candidates: 20                            # only score top-K from canonical_key shortlist
  threshold: 0.7                                  # P >= threshold -> merge
  fallback_to_heuristic: true

# Output
output:
  model_dir: ./models/entity_cross_encoder
