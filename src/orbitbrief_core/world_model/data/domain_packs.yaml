- id: wireless
  display_name: Wireless
  brain:
    intent: implemented
    implementation: wireless
    aliases: []
  # Boss-review v9 C001-F1 — pack-level anchor gate. wireless brain
  # only runs when the corpus has 2+ distinct AP/WLAN equipment
  # tokens. Mirrors the SOW validator anchor.
  required_anchor_min_distinct_hits: 2
  required_anchor_regex_any:
  - \b(access\s+points?|wlc|wireless\s+controller|wireless\s+lan\s+controller|wlan\s+controller)\b
  - \b(wi[- ]?fi\s+heatmap|wireless\s+heatmap|rf\s+heatmap)\b
