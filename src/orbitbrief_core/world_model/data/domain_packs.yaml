_doc: |
  OrbitBrief domain pack registry.
  Source of truth: AWESOME_CHASE intake workbook v4 (auto-extracted into
  ``keywords``) PLUS hand-curated ``boosted_keywords`` that disambiguate
  packs whose workbook keywords are too generic. To regenerate just the
  workbook-derived ``keywords`` portion, run:
      python tools/extract_domain_packs.py path/to/workbook.xlsx
  Boost lists must be re-applied after regeneration.
version: v4
packs:
- id: alm
  display_name: ALM
  brain:
    intent: none
    implementation: alm
    aliases: []
  intake_aliases: []
  subdomain_labels:
  - ALM – Release / Environment / Workflow Governance
  # Casual transcript "approval" / "workflow" must not select ALM as primary
  # for SD-WAN / Meraki network installs.
  required_anchor_min_distinct_hits: 2
  required_anchor_regex_any:
  - \b(alm|application\s+lifecycle|release\s+train|change\s+advisory)\b
  - \b(jira|servicenow|cmdb|itil|devops\s+pipeline)\b
  - \b(environment\s+(?:promotion|governance)|release\s+gate|workflow\s+approvals?)\b
  keywords:
  - environment
  - governance
  - release
  - workflow
  - alm
