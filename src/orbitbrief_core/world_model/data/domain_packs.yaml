_doc: |
  OrbitBrief domain pack registry.
  Source of truth: AWESOME_CHASE intake workbook v4 (auto-extracted into
  ``keywords``) PLUS hand-curated ``boosted_keywords`` that disambiguate
  packs whose workbook keywords are too generic. To regenerate just the
  workbook-derived ``keywords`` portion, run:
      python tools/extract_domain_packs.py path/to/workbook.xlsx
  Boost lists must be re-applied after regeneration.
