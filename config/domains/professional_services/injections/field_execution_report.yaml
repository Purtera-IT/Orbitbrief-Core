positive_signals:
- work performed
- completed/deferred/blocked tasks
- signoff
- test evidence
- closeout artifacts
- exception logs
- photos
negative_signals:
- generic template text with no execution truth
noise_patterns:
- repeated form labels
- empty checklist sections
normalization_rules:
- actual work performed outranks planned work
- preserve unresolved defects and missing deliverables
- do not overstate completion
- use B75/C75/B76/C76 source specs to enrich normalization and review triggers
review_triggers:
- missing signoff
- missing required deliverables
- incomplete testing
- contradictory completion status
- return visit implied
- customer acceptance unclear
