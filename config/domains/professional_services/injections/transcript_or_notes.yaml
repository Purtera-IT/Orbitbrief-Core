positive_signals:
- explicit customer ask
- scoping clarification
- decision
- by others
- not included
- assumption
- open question
negative_signals:
- signature block
- disclaimer
- repeated thread history
- greeting
noise_patterns:
- repeated email chain
- legal footer
- sender signature
normalization_rules:
- preserve meaning, not wording
- unresolved gaps go to open_questions
- do not infer quantities unless explicitly stated
