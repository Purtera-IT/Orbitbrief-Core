id: runtime.parsers.registry
version: 1.1.0
owner: Orbitbrief-Core
status: active

parsers:
  - parser_id: txt_basic_v1
    modality: txt
    adapter: orbitbrief_core.parser.adapters.txt:TxtAdapter
    strategy_defaults: [hybrid]
    capabilities:
      supports_sections: true
      supports_messages: false
      supports_page_provenance: false
      supports_ocr: false
    schema_refs: []
    enabled: true

  - parser_id: md_basic_v1
    modality: md
    adapter: orbitbrief_core.parser.adapters.md:MarkdownAdapter
    strategy_defaults: [hybrid]
    capabilities:
      supports_sections: true
      supports_messages: false
      supports_page_provenance: false
      supports_ocr: false
    schema_refs: []
    enabled: true

  - parser_id: docx_ooxml_v1
    modality: docx
    adapter: orbitbrief_core.parser.adapters.docx:DocxAdapter
    strategy_defaults: [project_memo, hybrid]
    capabilities:
      supports_sections: true
      supports_messages: false
      supports_page_provenance: false
      supports_ocr: false
    schema_refs: []
    enabled: true

  - parser_id: email_export_v1
    modality: email_export
    adapter: orbitbrief_core.parser.adapters.email_export:EmailExportAdapter
    strategy_defaults: [email_thread, hybrid]
    capabilities:
      supports_sections: true
      supports_messages: true
      supports_page_provenance: false
      supports_ocr: false
    schema_refs: []
    enabled: true

  - parser_id: pdf_text_v1
    modality: pdf_text
    adapter: orbitbrief_core.parser.adapters.pdf_text:PdfTextAdapter
    strategy_defaults: [project_memo, hybrid]
    capabilities:
      supports_sections: true
      supports_messages: false
      supports_page_provenance: true
      supports_ocr: false
    schema_refs: []
    enabled: true

  - parser_id: pdf_ocr_v1
    modality: pdf_ocr
    adapter: orbitbrief_core.parser.adapters.pdf_ocr:PdfOcrAdapter
    strategy_defaults: [project_memo, hybrid]
    capabilities:
      supports_sections: true
      supports_messages: false
      supports_page_provenance: true
      supports_ocr: true
    schema_refs: []
    enabled: true

  - parser_id: pasted_notes_v1
    modality: pasted_notes
    adapter: orbitbrief_core.parser.adapters.txt:TxtAdapter
    strategy_defaults: [meeting_notes, hybrid]
    capabilities:
      supports_sections: true
      supports_messages: false
      supports_page_provenance: false
      supports_ocr: false
    schema_refs: []
    enabled: true
